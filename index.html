<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Gods War: Visual Edition</title>
    <style>
        :root { --gold: #ffd700; --red: #ff4d4d; --bg: #121212; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        
        /* สไตล์การ์ดใหม่ */
        .card { 
            width: 110px; height: 160px; 
            border: 2px solid var(--gold); border-radius: 10px; 
            background: linear-gradient(145deg, #222, #444);
            display: inline-block; margin: 10px;
            cursor: pointer; position: relative;
            overflow: hidden; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        /* เพิ่มในส่วน <style> */
        .card.SR { border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff; animation: glow 2s infinite; }
        @keyframes glow {
            0% { box-shadow: 0 0 5px #ff00ff; }
            50% { box-shadow: 0 0 25px #ff00ff; }
            100% { box-shadow: 0 0 5px #ff00ff; }
        }
        .card:hover { transform: translateY(-15px) scale(1.1); box-shadow: 0 10px 20px var(--gold); }
        .card img { width: 100%; height: 70%; object-fit: cover; border-bottom: 1px solid var(--gold); }
        .card-info { padding: 5px; font-size: 11px; }
        .atk-badge { position: absolute; bottom: 5px; right: 5px; background: var(--red); color: white; padding: 2px 5px; border-radius: 3px; font-weight: bold; }

        .battlefield { display: flex; justify-content: space-around; align-items: center; height: 350px; background: url('https://www.transparenttextures.com/patterns/dark-matter.png'); border-bottom: 3px solid #333; }
        .hand-container { background: rgba(0,0,0,0.8); padding: 20px; min-height: 180px; overflow-x: auto; white-space: nowrap; }
        
        #battle-log { background: rgba(0,0,0,0.9); color: #0f0; padding: 10px; height: 80px; overflow-y: auto; font-family: monospace; font-size: 12px; border-top: 1px solid #444; }
        
        .header-stats { background: #000; padding: 15px; display: flex; justify-content: space-around; font-size: 20px; border-bottom: 2px solid var(--gold); }
        button { padding: 12px 25px; font-size: 16px; background: var(--gold); border: none; border-radius: 20px; font-weight: bold; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div>🔱 Enemy Zeus HP: <span id="zeus-life" style="color:var(--red)">5</span></div>
        <div>🎴 Deck: <span id="deck-count">50</span></div>
    </div>

    <div class="battlefield">
        <div id="player-field" style="color:#aaa">สนามรบ</div>
        
        <div class="card" style="border-color:var(--red); width: 140px; height: 200px;">
            <img src="https://res.cloudinary.com/dju44op8w/image/upload/v1777467100/Gemini_Generated_Image_y35m84y35m84y35m_phm30l.jpg" alt="Zeus">
            <div class="card-info"><h3>ZEUS</h3></div>
            <div class="atk-badge">DEF: 5000</div>
        </div>
    </div>

    <button onclick="drawCard()">🎴 จั่วการ์ดใหม่</button>

    <div id="battle-log">--- เตรียมตัวเข้าสู่มหาสงครามเทพเจ้า ---</div>

    <div class="hand-container" id="player-hand"></div>

    <script>
        const cardTypes = [
            { name: "Wukong", atk: 6000, img: "https://res.cloudinary.com/dju44op8w/image/upload/v1777467648/Gemini_Generated_Image_4wo9z44wo9z44wo9_ry0w3f.jpg" },
            { name: "Spartan", atk: 4000, img: "https://res.cloudinary.com/dju44op8w/image/upload/v1777467845/Gemini_Generated_Image_b5bzkyb5bzkyb5bz_dufa4t.jpg" },
            { name: "Valkyrie", atk: 5500, img: "https://res.cloudinary.com/dju44op8w/image/upload/v1777467981/Gemini_Generated_Image_kefxgakefxgakefx_plgdep.jpg" },
            { name: "Centaur", atk: 4500, img: "https://res.cloudinary.com/dju44op8w/image/upload/v1777468077/Gemini_Generated_Image_3bqflw3bqflw3bqf_eq9uny.jpg" }
        ];

        let deck = [];
        let hand = [];
        let zeusLife = 5;

        function initGame() {
            deck = [];
            for (let i = 0; i < 50; i++) {
                let roll = Math.random() * 100; // สุ่มเลข 0-100
                let card;

                if (roll < 10) { 
                    // 10% ได้ Super Rare (Wukong)
                    card = { ...cardTypes[0], rarity: 'SR', color: '#ff00ff' }; 
                } else if (roll < 40) { 
                    // 30% ได้ Rare (Valkyrie)
                    card = { ...cardTypes[2], rarity: 'R', color: '#00ccff' };
                } else { 
                    // 60% ได้ Common (Spartan, Centaur)
                    let commonCards = [cardTypes[1], cardTypes[3]];
                    card = { ...commonCards[Math.floor(Math.random() * 2)], rarity: 'C', color: '#ffffff' };
                }
                deck.push({ ...card, id: i });
            }
            updateUI();
        }

        function drawCard() {
            if (deck.length > 0 && hand.length < 6) {
                hand.push(deck.pop());
                updateUI();
            }
        }

        function playCard(index) {
            // 1. เช็คก่อนว่าถ้า Zeus ตายแล้ว ไม่ต้องทำอะไรต่อ
            if (zeusLife <= 0) {
                addLog("⚔️ สงครามจบลงแล้ว! Zeus พ่ายแพ้ไปแล้ว");
                return; 
            }

            const card = hand[index];
            addLog(`${card.name} บุกโจมตี!`);
            
            if (card.atk >= 5000) {
                zeusLife--;
                if (zeusLife < 0) { zeusLife = 0; }
                addLog(`✅ สำเร็จ! Zeus บาดเจ็บ (-1 HP)`);
            } else {
                addLog(`❌ พ่ายแพ้! พลังของ ${card.name} ไม่พอ`);
            }
            
            // ลบการ์ดที่ใช้ออก
            hand.splice(index, 1);
            updateUI();

            // 2. เช็คผลลัพธ์หลังการโจมตี
            if (zeusLife === 0) {
                addLog("<br>🌟========================🌟");
                addLog("🏆 ชัยชนะเป็นของคุณ! ZEUS HAS BEEN DEFEATED!");
                addLog("🌟========================🌟");
                
                // (Optional) เพิ่มเอฟเฟกต์เด้งเตือน
                setTimeout(() => {
                    alert("ยินดีด้วย! คุณโค่นเทพเจ้าซุสได้สำเร็จ!");
                }, 500);
            }
        }

        function updateUI() {
            document.getElementById('zeus-life').innerText = zeusLife;
            document.getElementById('deck-count').innerText = deck.length;
            const zeusCard = document.querySelector('.card.enemy'); // เลือกการ์ดซุส
            if (zeusLife <= 0) {
                zeusCard.style.opacity = "0.3"; // ทำให้จางลง
                zeusCard.style.filter = "grayscale(100%)"; // ทำให้เป็นสีขาวดำ
                zeusCard.style.transform = "rotate(90deg)"; // นอนลง (ตาย)
            }
            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = '';
            hand.forEach((card, i) => {
                handDiv.innerHTML += `
                    <div class="card" onclick="playCard(${i})">
                        <img src="${card.img}">
                        <div class="card-info"><b>${card.name}</b></div>
                        <div class="atk-badge">${card.atk}</div>
                    </div>
                `;
            });
        }

        function addLog(msg) {
            const log = document.getElementById('battle-log');
            log.innerHTML += `<br>> ${msg}`;
            log.scrollTop = log.scrollHeight;
        }

        initGame();
    </script>
</body>
</html>
