<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Celestial War: Mobile Edition</title>
    <style>
        :root { --gold: #ffd700; --red: #ff4d4d; --blue: #00ccff; --bg: #0a0a0a; --green: #2ecc71; --orange: #e67e22; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header - ปรับให้เล็กลงประหยัดที่ */
        .header-stats { background: #000; padding: 8px; display: flex; justify-content: space-around; border-bottom: 2px solid var(--gold); flex-shrink: 0; }
        .hp-box { font-size: 14px; font-weight: bold; width: 45%; }
        .hp-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 4px; border: 1px solid #555; }
        .hp-bar-fill { height: 100%; background: var(--green); transition: 0.3s; }

        /* Essence Info - ปรับให้ดูโมเดิร์นบนมือถือ */
        .info-bar { display: flex; justify-content: space-between; padding: 5px 15px; background: #1a0505; border-bottom: 1px solid #333; align-items: center; font-size: 12px; flex-shrink: 0; }
        .ess-monitor { font-weight: bold; padding: 4px 10px; border-radius: 6px; border: 1px solid; min-width: 90px; text-align: center; }
        .ess-p { border-color: var(--blue); color: var(--blue); }
        .ess-e { border-color: var(--red); color: var(--red); }

        /* Battlefield - พื้นที่หลักสำหรับการเล่น */
        .battlefield { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; background: radial-gradient(circle at center, #200 0%, #0a0a0a 100%); overflow: hidden; }
        .field-zone { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; min-height: 140px; width: 100%; border: 1px solid rgba(255,215,0,0.05); border-radius: 12px; padding: 5px; }

        /* Card System - ปรับขนาดให้เหมาะกับจอเล็ก */
        .card { width: 75px; height: 110px; border: 2px solid var(--gold); border-radius: 8px; background: #111; position: relative; cursor: pointer; transition: 0.1s; flex-shrink: 0; }
        .card img { width: 100%; height: 55%; object-fit: cover; border-radius: 6px 6px 0 0; }
        .rest { transform: rotate(90deg) scale(0.85) !important; filter: brightness(0.4); }
        
        /* Badges */
        .badge { position: absolute; padding: 1px 3px; border-radius: 3px; font-size: 9px; font-weight: bold; border: 1px solid #000; }
        .cost-val { top: -6px; left: -6px; background: var(--blue); width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid white; color: white; font-size: 10px; }
        .atk-cost { bottom: 3px; left: 3px; background: var(--gold); color: #000; }
        .atk-val { bottom: 3px; right: 3px; background: var(--red); color: white; }
        .tag { position: absolute; top: 3px; right: 3px; font-size: 7px; padding: 1px 3px; border-radius: 2px; font-weight: bold; }
        .tag-blocker { background: var(--green); color: black; }
        .tag-counter { background: var(--orange); color: white; }
        .tag-event { background: #8e44ad; color: white; left: 3px; bottom: 3px; top: auto; right: auto; }
        .tag-rush { background: var(--red); color: white; left: 3px; top: 3px; right: auto; }

        /* Animations */
        .float-text { position: absolute; font-weight: bold; font-size: 24px; z-index: 1000; animation: floatUp 1s ease-out forwards; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(1.5); } }

        /* Highlights */
        .is-attacking { border: 3px solid var(--blue) !important; box-shadow: 0 0 15px var(--blue); transform: scale(1.05); z-index: 5; }
        .is-targetable { border: 3px solid var(--red) !important; animation: pulse-red 0.8s infinite; }
        @keyframes pulse-red { 50% { box-shadow: 0 0 15px var(--red); } }

        /* Hand Container - เลื่อนซ้ายขวาได้ */
        .hand-container { background: rgba(0,0,0,0.7); padding: 10px; display: flex; gap: 10px; overflow-x: auto; min-height: 130px; border-top: 1px solid var(--gold); -webkit-overflow-scrolling: touch; flex-shrink: 0; }
        
        /* Log & Controls */
        #battle-log { background: #000; color: #0f0; padding: 8px; height: 60px; overflow-y: auto; font-family: monospace; font-size: 11px; flex-shrink: 0; }
        .controls { padding: 8px; background: #111; display: flex; justify-content: center; gap: 10px; flex-shrink: 0; }
        button { padding: 10px 15px; font-size: 13px; font-weight: bold; border-radius: 15px; border: none; cursor: pointer; }

        #defense-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .leader-card { width: 85px; height: 125px; border-width: 3px; }

        #faction-selection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; overflow-y: auto; padding: 20px;}
        .faction-btn { width: 90%; max-width: 400px; padding: 15px; font-size: 16px; border-radius: 10px; border: 2px solid var(--gold); background: #111; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .faction-btn img { height: 80px; border-radius: 5px; }

        /* Deck Builder Styles */
        #deck-builder-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; flex-direction: column; }
        .builder-header { background: #111; border-bottom: 2px solid var(--gold); padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .builder-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .card-pool { flex: 1; overflow-y: auto; padding: 10px; border-bottom: 1px solid #333; background: #1a1a1a; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-content: flex-start; }
        .deck-list { flex: 1; overflow-y: auto; padding: 10px; background: #0a0a0a; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-content: flex-start; }
        .builder-section-title { width: 100%; text-align: center; color: #888; font-size: 12px; margin-bottom: 5px; }
    </style>
</head>
<body>
    <!-- Audio Assets (Local MP3 for 100% Mobile Support) -->
    <audio id="bgm-menu" src="./assets/sounds/bgm-menu.mp3" loop></audio>
    <audio id="bgm-battle" src="./assets/sounds/bgm-battle.mp3" loop></audio>
    <audio id="bgm-win" src="./assets/sounds/bgm-win.mp3"></audio>
    <audio id="bgm-lose" src="./assets/sounds/bgm-lose.mp3"></audio>
    
    <audio id="sfx-attack" src="./assets/sounds/sfx-attack.mp3"></audio>
    <audio id="sfx-draw" src="./assets/sounds/sfx-draw.mp3"></audio>
    <audio id="sfx-magic" src="./assets/sounds/sfx-magic.mp3"></audio>
    <audio id="sfx-heal" src="./assets/sounds/sfx-heal.mp3"></audio>

    <div id="defense-overlay">
        <h3 style="color:var(--red); margin-bottom:20px;">🚨 ถูกโจมตี! เลือกการป้องกัน</h3>
        <div id="defense-options" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
    </div>

    <div id="faction-selection">
        <h2 style="color:var(--gold); margin-bottom: 10px;">⚔️ TRAINING MODE ⚔️</h2>
        <p>เลือกฝ่ายที่คุณต้องการเล่น</p>
        <button class="faction-btn" onclick="selectFaction('china')">
            <img src="./assets/images/leader_jade_emperor.png">
            <div>⛩️ ฝ่ายจีน (China)<br><span style="font-size:12px;color:#aaa">ควบคุมเง็กเซียนฮ่องเต้ สู้กับ ซุส</span></div>
        </button>
        <button class="faction-btn" onclick="selectFaction('greek')" style="border-color: var(--blue);">
            <img src="./assets/images/leader_zeus.png">
            <div>🔱 ฝ่ายกรีก (Greek)<br><span style="font-size:12px;color:#aaa">ควบคุมซุส สู้กับ เง็กเซียนฮ่องเต้</span></div>
        </button>
        <div style="display:flex; gap:10px; width: 90%; max-width: 400px;">
            <button class="faction-btn" onclick="openDeckBuilder('china')" style="border-color: var(--red); padding: 10px; flex:1;">
                <div style="font-size:24px;">⛩️</div>
                <div style="font-size:14px;">จัดเด็คจีน</div>
            </button>
            <button class="faction-btn" onclick="openDeckBuilder('greek')" style="border-color: var(--blue); padding: 10px; flex:1;">
                <div style="font-size:24px;">🔱</div>
                <div style="font-size:14px;">จัดเด็คกรีก</div>
            </button>
        </div>
    </div>

    <div id="deck-builder-screen">
        <div class="builder-header">
            <h3 style="margin:0; color:var(--gold);">🛠️ Deck: <span id="db-count">0</span>/50</h3>
            <button style="background:var(--green); color:black;" onclick="saveAndExitBuilder()">💾 บันทึก & ออก</button>
        </div>
        <div class="builder-content">
            <div class="card-pool" id="db-inventory">
                <div class="builder-section-title">คลังสมบัติ (แตะเพื่อนำเข้าเด็ค)</div>
            </div>
            <div class="deck-list" id="db-deck">
                <div class="builder-section-title">เด็คปัจจุบัน (แตะเพื่อถอดออก)</div>
            </div>
        </div>
    </div>

    <div class="header-stats game-ui" style="display:none;">
        <div class="hp-box"><span id="e-leader-icon">🔱</span> <span id="e-leader-name-ui">ZEUS</span>: <span id="e-hp-num">5</span> HP <div class="hp-bar-bg"><div id="e-hp-bar" class="hp-bar-fill"></div></div></div>
        <div class="hp-box"><span id="p-leader-icon">⛩️</span> <span id="p-leader-name-ui">YOU</span>: <span id="p-hp-num">5</span> HP <div class="hp-bar-bg"><div id="p-hp-bar" class="hp-bar-fill"></div></div></div>
    </div>

    <div class="info-bar game-ui" style="display:none;">
        <div class="ess-monitor ess-e">AI: <span id="e-ess-ui">0/0</span></div>
        <div style="font-size: 10px; opacity: 0.6;">D: <span id="e-deck-ui">50</span> | <span id="p-deck-ui">50</span></div>
        <div class="ess-monitor ess-p">P: <span id="p-ess-ui">0/0</span></div>
    </div>

    <div class="battlefield game-ui" style="display:none;">
        <div id="e-field-zone" class="field-zone">
            <div id="e-leader" class="card leader-card" onclick="onTarget('leader', 0)" style="border-color:var(--red)">
                <img id="e-leader-img" src="./assets/images/leader_zeus.png">
                <div class="badge atk-cost">⚔️ 1</div><div class="badge atk-val">5000</div>
            </div>
            <div id="e-units" style="display:flex; gap:8px;"></div>
        </div>

        <div id="p-field-zone" class="field-zone">
            <div id="p-units" style="display:flex; gap:8px;"></div>
            <div id="p-leader" class="card leader-card" onclick="onAttack('leader', 0)" style="border-color:var(--blue)">
                <img id="p-leader-img" src="./assets/images/leader_jade_emperor.png">
                <div class="badge atk-cost">⚔️ 1</div><div class="badge atk-val">5000</div>
            </div>
        </div>
    </div>

    <div id="battle-log" class="game-ui" style="display:none;">> เลือกฝ่ายเริ่มเกม...</div>
    
    <div class="controls game-ui" style="display:none;">
        <div id="start-buttons" style="display:flex; flex-direction:column; gap:10px;">
            <div style="display:flex; gap:10px;">
                <button id="btn-start-p" style="background:var(--gold)" onclick="startGame(true)">สู้กับบอท (คุณเริ่มก่อน)</button>
                <button id="btn-start-e" style="background:var(--red); color:white" onclick="startGame(false)">สู้กับบอท (บอทเริ่มก่อน)</button>
            </div>
            <button id="btn-find-match" style="background:var(--blue); color:white; width:100%; font-size:16px;" onclick="findMatch()">🌐 ค้นหาคู่ต่อสู้ (Multiplayer)</button>
            <div id="queue-status" style="color:var(--blue); font-weight:bold; display:none; text-align:center;">กำลังรอผู้เล่นคนอื่น... ⏳</div>
        </div>
        <button id="end-btn" style="display:none; background:var(--red); color:white;" onclick="endTurn()">⏭️ จบเทิร์น</button>
    </div>

    <div id="p-hand-ui" class="hand-container game-ui" style="display:none;"></div>

    <!-- Load Socket.io Client -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <!-- Load Supabase Asynchronously so it doesn't block UI -->
    <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
    <script src="./js/cards.js?v=5"></script>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            return false;
        };

        const chinaCards = window.CardDatabase ? window.CardDatabase.chinaCards : [];
        const greekCards = window.CardDatabase ? window.CardDatabase.greekCards : [];

        let pHP = 5, eHP = 5, pEss = 0, pMax = 0, eEss = 0, eMax = 0, isPlayerTurn = true, pOrder = 1;
        let pDeckArr = [], eDeckArr = [], pDeck = 50, eDeck = 50;
        let pHand = [], eHand = [], pField = [], eField = [], selected = null;
        let currentDefenseTarget = { type: 'leader', idx: 0 };
        let aiAttackQueue = [];
        
        let pFaction = 'china', eFaction = 'greek';
        let pLeaderName = "เง็กเซียน", eLeaderName = "ซุส";
        let customDeckChina = [];
        let customDeckGreek = [];
        
        let playerId = null;
        try { playerId = localStorage.getItem('godswar_player_id'); } catch(e) {}
        
        let dbClient;
        let socket;
        
        // --- MULTIPLAYER CONFIG ---
        // Change this to your Render.com URL after deploying the server folder
        const SOCKET_SERVER_URL = "https://gods-war-server.onrender.com"; 

        // Database Initialization (Cloud + Local Fallback)
        function generateSafeUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function safeSetLocal(key, val) {
            try { localStorage.setItem(key, val); } catch(e) { console.warn("Local storage disabled"); }
        }
        function safeGetLocal(key) {
            try { return localStorage.getItem(key); } catch(e) { return null; }
        }

        async function initDatabase() {
            try {
                if (!window.supabase) throw new Error("Supabase SDK not loaded or blocked by browser");
                dbClient = window.supabase.createClient('https://xgmqqyriwoxzxtlzkmwp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbXFxeXJpd294enh0bHprbXdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTY1OTEsImV4cCI6MjA5MzEzMjU5MX0.YnOFAdSOowCHS3AgOVihAeTT31-mkQNmQAjgfhMVhu8');
            
                if (!playerId) {
                    playerId = generateSafeUUID();
                    safeSetLocal('godswar_player_id', playerId);
                }
                
                // Ensure player exists in DB to prevent Foreign Key constraints on player_decks
                await dbClient.from('players').insert([{ id: playerId, username: 'Player_' + Math.floor(Math.random()*1000) }]);

                const { data: decks, error } = await dbClient.from('player_decks').select('*').eq('player_id', playerId);
                if (error) throw error;

                // Sync China Deck
                let cDeck = decks && decks.find(d => d.faction === 'china');
                if (cDeck && cDeck.cards_json) {
                    customDeckChina = cDeck.cards_json;
                    safeSetLocal('godswar_deck_china', JSON.stringify(customDeckChina));
                } else {
                    let sChina = safeGetLocal('godswar_deck_china');
                    customDeckChina = sChina ? JSON.parse(sChina) : Array.from({length: 50}, (_, i) => ({...chinaCards[i%chinaCards.length], id: Math.random()}));
                    await dbClient.from('player_decks').insert([{ player_id: playerId, faction: 'china', cards_json: customDeckChina }]);
                }

                // Sync Greek Deck
                let gDeck = decks && decks.find(d => d.faction === 'greek');
                if (gDeck && gDeck.cards_json) {
                    customDeckGreek = gDeck.cards_json;
                    safeSetLocal('godswar_deck_greek', JSON.stringify(customDeckGreek));
                } else {
                    let sGreek = safeGetLocal('godswar_deck_greek');
                    customDeckGreek = sGreek ? JSON.parse(sGreek) : Array.from({length: 50}, (_, i) => ({...greekCards[i%greekCards.length], id: Math.random()}));
                    await dbClient.from('player_decks').insert([{ player_id: playerId, faction: 'greek', cards_json: customDeckGreek }]);
                }
                console.log("Database Sync Complete!");
            } catch (err) {
                console.warn("Supabase Offline or Blocked, falling back to Local", err);
                if (!playerId) {
                    playerId = generateSafeUUID();
                    safeSetLocal('godswar_player_id', playerId);
                }
                let sChina = safeGetLocal('godswar_deck_china');
                customDeckChina = sChina ? JSON.parse(sChina) : Array.from({length: 50}, (_, i) => ({...chinaCards[i%chinaCards.length], id: Math.random()}));
                let sGreek = safeGetLocal('godswar_deck_greek');
                customDeckGreek = sGreek ? JSON.parse(sGreek) : Array.from({length: 50}, (_, i) => ({...greekCards[i%greekCards.length], id: Math.random()}));
            }
        }
        
        // Wait for DOM to finish loading before trying to hit network
        setTimeout(initDatabase, 500);

        // Deck Builder Logic
        let builderInventory = [];
        let builderDeck = [];
        let currentBuilderFaction = 'china';

        function openDeckBuilder(faction) {
            currentBuilderFaction = faction;
            document.getElementById('faction-selection').style.display = 'none';
            document.getElementById('deck-builder-screen').style.display = 'flex';
            
            // Give player 10 copies of their faction cards as "Inventory" for testing
            const allCards = faction === 'china' ? chinaCards : greekCards;
            builderInventory = [];
            allCards.forEach(c => {
                for(let i=0; i<10; i++) builderInventory.push({...c, builderId: Math.random()});
            });

            // Load saved deck
            let sDeck = safeGetLocal(`godswar_deck_${faction}`);
            builderDeck = sDeck ? JSON.parse(sDeck) : [];
            
            // Remove deck cards from inventory so they don't duplicate
            builderDeck.forEach(dc => {
                let idx = builderInventory.findIndex(ic => ic.name === dc.name);
                if(idx !== -1) builderInventory.splice(idx, 1);
            });

            renderBuilder();
        }

        function renderBuilder() {
            document.getElementById('db-count').innerText = builderDeck.length;
            document.getElementById('db-count').style.color = builderDeck.length === 50 ? 'var(--green)' : 'var(--red)';

            const invZone = document.getElementById('db-inventory');
            invZone.innerHTML = '<div class="builder-section-title">คลังสมบัติ (แตะเพื่อนำเข้าเด็ค)</div>';
            builderInventory.forEach((c, i) => {
                invZone.innerHTML += `<div class="card" style="border-color:${c.faction==='china'?'var(--red)':'var(--blue)'}" onclick="moveCard('toDeck', ${i})"><div class="cost-val">${c.cost}</div><img src="${c.img}"><div class="badge atk-val">${c.atk || ''}</div></div>`;
            });

            const deckZone = document.getElementById('db-deck');
            deckZone.innerHTML = '<div class="builder-section-title">เด็คปัจจุบัน (แตะเพื่อถอดออก)</div>';
            builderDeck.forEach((c, i) => {
                deckZone.innerHTML += `<div class="card" style="border-color:${c.faction==='china'?'var(--red)':'var(--blue)'}" onclick="moveCard('toInv', ${i})"><div class="cost-val">${c.cost}</div><img src="${c.img}"><div class="badge atk-val">${c.atk || ''}</div></div>`;
            });
        }

        function moveCard(direction, idx) {
            if (direction === 'toDeck') {
                if (builderDeck.length >= 50) return alert("เด็คเต็มแล้ว! (สูงสุด 50 ใบ)");
                let card = builderInventory.splice(idx, 1)[0];
                builderDeck.push(card);
                playSound('sfx-draw');
            } else {
                let card = builderDeck.splice(idx, 1)[0];
                builderInventory.push(card);
                playSound('sfx-draw');
            }
            renderBuilder();
        }

        async function saveAndExitBuilder() {
            if (builderDeck.length !== 50) {
                return alert("ต้องมีการ์ดครบ 50 ใบพอดีถึงจะบันทึกได้ครับ!");
            }
            
            // 1. Save Local
            safeSetLocal(`godswar_deck_${currentBuilderFaction}`, JSON.stringify(builderDeck));
            if (currentBuilderFaction === 'china') customDeckChina = builderDeck;
            else customDeckGreek = builderDeck;
            
            // 2. Save Cloud (Supabase)
            try {
                if (playerId && dbClient) {
                    await dbClient.from('player_decks').upsert({
                        player_id: playerId,
                        faction: currentBuilderFaction,
                        cards_json: builderDeck
                    }, { onConflict: 'player_id, faction' });
                }
            } catch (err) {
                console.warn("Could not save to Supabase, but saved locally.", err);
            }

            document.getElementById('deck-builder-screen').style.display = 'none';
            document.getElementById('faction-selection').style.display = 'flex';
            playSound('sfx-magic');
        }

        function playSound(id) {
            let s = document.getElementById(id);
            if(s) { 
                if(id.startsWith('bgm')) s.volume = 0.6;
                s.currentTime = 0; 
                s.play().catch(e=>console.log("Audio play prevented")); 
            }
        }

        let audioUnlocked = false;
        document.body.addEventListener('click', () => {
            if(!audioUnlocked) {
                audioUnlocked = true;
                playSound('bgm-menu');
            }
        });

        function selectFaction(faction) {
            document.getElementById('faction-selection').style.display = 'none';
            document.querySelectorAll('.game-ui').forEach(el => el.style.display = '');
            
            if (faction === 'greek') {
                pFaction = 'greek'; eFaction = 'china';
                pLeaderName = "ซุส"; eLeaderName = "เง็กเซียน";
                document.getElementById('p-leader-img').src = "./assets/images/leader_zeus.png";
                document.getElementById('e-leader-img').src = "./assets/images/leader_jade_emperor.png";
                document.getElementById('p-leader-name-ui').innerText = "ZEUS";
                document.getElementById('e-leader-name-ui').innerText = "JADE EMPEROR";
                document.getElementById('p-leader-icon').innerText = "🔱";
                document.getElementById('e-leader-icon').innerText = "⛩️";
                document.getElementById('p-leader').style.borderColor = "var(--red)";
                document.getElementById('e-leader').style.borderColor = "var(--blue)";
                
                document.getElementById('btn-start-p').innerText = "คุณ (กรีก) เริ่มก่อน";
                document.getElementById('btn-start-e').innerText = "AI (จีน) เริ่มก่อน";
            } else {
                pFaction = 'china'; eFaction = 'greek';
                pLeaderName = "เง็กเซียน"; eLeaderName = "ซุส";
                document.getElementById('btn-start-p').innerText = "คุณ (จีน) เริ่มก่อน";
                document.getElementById('btn-start-e').innerText = "AI (กรีก) เริ่มก่อน";
            }
        }

        function generateDeck(pool) {
            let deck = []; let i = 0;
            while(deck.length < 50) { deck.push({...pool[i % pool.length], id: Math.random()}); i++; }
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        // --- MULTIPLAYER LOGIC ---
        let currentRoomId = null;
        let isMultiplayer = false;

        function findMatch() {
            document.getElementById('btn-start-p').style.display = 'none';
            document.getElementById('btn-start-e').style.display = 'none';
            document.getElementById('btn-find-match').style.display = 'none';
            document.getElementById('queue-status').style.display = 'block';

            if (!socket) {
                socket = io(SOCKET_SERVER_URL);
                
                socket.on('connect_error', () => {
                    alert("เซิร์ฟเวอร์ Multiplayer ปิดอยู่ครับ (รอเซ็ตอัพบน Render)");
                    location.reload();
                });

                socket.on('matchFound', (data) => {
                    document.getElementById('queue-status').innerText = "พบผู้เล่นแล้ว! กำลังเข้าสู่สังเวียน...";
                    setTimeout(() => startMultiplayerGame(data), 1500);
                });

                socket.on('opponentDisconnected', () => {
                    alert("คู่ต่อสู้หนีออกจากเกม! คุณชนะ!");
                    location.reload();
                });
            }

            let activeDeck = pFaction === 'china' ? customDeckChina : customDeckGreek;
            socket.emit('joinQueue', {
                faction: pFaction,
                deck: activeDeck,
                username: "Player" // Can be fetched from Supabase later
            });
        }

        function startMultiplayerGame(matchData) {
            isMultiplayer = true;
            currentRoomId = matchData.roomId;
            let opponent = matchData.opponent;
            
            document.getElementById('bgm-menu').pause();
            playSound('bgm-battle');
            document.getElementById('start-buttons').style.display = 'none';
            document.getElementById('queue-status').style.display = 'none';
            document.getElementById('end-btn').style.display = 'block';

            // Override opponent data with real player data
            eFaction = opponent.faction;
            eLeaderName = eFaction === 'china' ? 'เง็กเซียน' : 'ซุส';
            document.getElementById('e-leader-img').src = eFaction === 'china' ? "./assets/images/leader_jade_emperor.png" : "./assets/images/leader_zeus.png";
            document.getElementById('e-leader-name-ui').innerText = eFaction === 'china' ? "JADE EMPEROR" : "ZEUS";
            document.getElementById('e-leader-icon').innerText = eFaction === 'china' ? "⛩️" : "🔱";
            document.getElementById('e-leader').style.borderColor = eFaction === 'china' ? "var(--red)" : "var(--blue)";

            // Prepare Decks
            let activeDeck = pFaction === 'china' ? customDeckChina : customDeckGreek;
            pDeckArr = JSON.parse(JSON.stringify(activeDeck)).map(c => ({...c, id: Math.random()}));
            for (let i = pDeckArr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pDeckArr[i], pDeckArr[j]] = [pDeckArr[j], pDeckArr[i]]; }
            
            eDeckArr = opponent.deck.map(c => ({...c, id: Math.random()}));
            for (let i = eDeckArr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [eDeckArr[i], eDeckArr[j]] = [eDeckArr[j], eDeckArr[i]]; }
            
            pDeck = 50; eDeck = 50;
            pHand = []; eHand = [];
            for(let i=0; i<5; i++) { if(eDeck > 0) { eHand.push(eDeckArr.pop()); eDeck--; } }
            drawCards(5);

            pOrder = matchData.isFirst ? 1 : 2; 
            isPlayerTurn = matchData.isFirst;

            addLog(`🎮 เริ่มเกม! (Multiplayer VS Real Player)`);
            if(isPlayerTurn) { 
                pMax = 1; pEss = 1; eMax = 0; eEss = 0; 
                addLog("คุณได้เริ่มก่อน! ได้รับ 1 Essence"); 
            } else { 
                eMax = 1; eEss = 1; pMax = 0; pEss = 0; 
                addLog(`คู่ต่อสู้เริ่มก่อน รอเทิร์น...`); 
                // Multiplayer wait logic will be implemented here
            }
            updateUI();
        }

        function startGame(first) {
            document.getElementById('bgm-menu').pause();
            playSound('bgm-battle');
            document.getElementById('start-buttons').style.display = 'none';
            document.getElementById('end-btn').style.display = 'block';
            pOrder = first ? 1 : 2; isPlayerTurn = first;
            
            // Load user's custom deck based on faction
            let activeDeck = pFaction === 'china' ? customDeckChina : customDeckGreek;
            let userDeckClone = JSON.parse(JSON.stringify(activeDeck)).map(c => ({...c, id: Math.random()}));
            for (let i = userDeckClone.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [userDeckClone[i], userDeckClone[j]] = [userDeckClone[j], userDeckClone[i]];
            }
            pDeckArr = userDeckClone;
            
            // AI still uses standard generated deck based on faction
            eDeckArr = generateDeck(eFaction === 'greek' ? greekCards : chinaCards);
            
            pDeck = 50; eDeck = 50;
            pHand = []; eHand = [];
            for(let i=0; i<5; i++) { if(eDeck > 0) { eHand.push(eDeckArr.pop()); eDeck--; } }
            drawCards(5);
            addLog(`🎮 เริ่มเกม! ${first ? "คุณเริ่มก่อน" : "AI เริ่มก่อน"}`);
            if(first) { pMax = 1; pEss = 1; eMax = 0; eEss = 0; addLog("เทิร์นแรกของคุณ ได้รับ 1 Essence"); } 
            else { eMax = 1; eEss = 1; pMax = 0; pEss = 0; addLog(`เทิร์นแรกของ AI ได้รับ 1 Essence`); setTimeout(enemyTurn, 1000); }
            updateUI();
        }

        function onAttack(type, idx) {
            if (!isPlayerTurn || selected) { selected = null; updateUI(); return; }
            let card = (type === 'leader') ? { name: pLeaderName, atkCost: 1, isRest: document.getElementById('p-leader').classList.contains('rest') } : pField[idx];
            if (card.isRest || pEss < card.atkCost) return;
            selected = { type, idx, atkCost: card.atkCost };
            updateUI();
        }

        function onTarget(type, idx) {
            if (!selected) return;
            let target = (type === 'leader') ? { name: eLeaderName } : eField[idx];
            if (type !== 'leader' && !target.isRest) { selected = null; updateUI(); return; }
            
            let attacker = (selected.type === 'leader') ? {name: pLeaderName, atk: 5000} : pField[selected.idx];
            let targetATK = (type === 'leader') ? 5000 : target.atk;
            
            if (attacker.atk < targetATK) {
                alert(`โจมตีไม่ได้! พลังโจมตีของคุณ (${attacker.atk}) น้อยกว่าศัตรู (${targetATK})`);
                selected = null; updateUI(); return;
            }

            pEss -= selected.atkCost;
            addLog(`💥 ${attacker.name} โจมตีใส่ ${target.name}!`);
            playSound('sfx-attack');

            if (selected.type === 'leader') document.getElementById('p-leader').classList.add('rest');
            else pField[selected.idx].isRest = true;
            
            setTimeout(() => {
                let blockerIdx = eField.findIndex(c => c.type === 'blocker' && !c.isRest);
                if(blockerIdx !== -1) { 
                    showFloatingText(`e-unit-${blockerIdx}`, "บล็อก!", "dmg");
                    eField.splice(blockerIdx, 1); 
                    addLog("🛡️ บล็อก!"); 
                } else { 
                    if (type === 'leader') { 
                        eHP--; 
                        showFloatingText('e-leader', "-1", "dmg");
                    } else { 
                        showFloatingText(`e-unit-${idx}`, "DEAD", "dmg");
                        eField.splice(idx, 1); 
                    } 
                }
                selected = null; updateUI(); checkWin();
            }, 500);
        }

        function enemyTurn() {
            if (eMax === 0) eMax = 2; else eMax = Math.min(10, eMax + 2);
            eEss = eMax;
            eField.forEach(c => c.isRest = false);
            
            if (eDeck > 0) { eHand.push(eDeckArr.pop()); eDeck--; }
            
            addLog(`⚡ ${eLeaderName} เข้าสู่เทิร์น! ได้รับ +2 Essence (รวม ${eEss}/${eMax})`);

            let reservedEssence = 1 + eField.filter(c => !c.isRest).reduce((sum, c) => sum + c.atkCost, 0);

            while(eField.length < 5 && eHand.length > 0 && eEss > reservedEssence) {
                let affordableIdx = eHand.findIndex(c => c.cost <= (eEss - reservedEssence));
                if (affordableIdx !== -1) {
                    let rCard = eHand.splice(affordableIdx, 1)[0];
                    eEss -= rCard.cost;
                    
                    if (rCard.type === 'event') {
                        addLog(`📜 AI ใช้เวทมนตร์: ${rCard.name}`);
                        playSound('sfx-magic');
                        
                        if (rCard.effect === 'heal_1') {
                            eHP = Math.min(5, eHP + 1);
                            showFloatingText('e-leader', "+1", "heal");
                            playSound('sfx-heal');
                            addLog(`💖 ${eLeaderName} ฟื้นฟู 1 HP!`);
                        } else if (rCard.effect === 'ai_summon') {
                            addLog(`✨ พลังนิมิต! AI เรียกทหาร 1 ตัว!`);
                            let unit = eHand.find(c => c.type !== 'event'); // Pull from hand, if none, fail
                            if (unit) { 
                                eHand.splice(eHand.indexOf(unit), 1);
                                eField.push({...unit, isRest: true});
                            }
                        } else if (rCard.effect === 'board_wipe') {
                            showFloatingText('p-leader', "⚡ พิโรธ!", "dmg");
                            pField = [];
                            addLog(`⚡ ${rCard.name} กวาดล้างทหารของคุณทั้งหมด!!`);
                        }
                    } else {
                        rCard.isRest = !(rCard.skills && rCard.skills.includes('rush'));
                        eField.push(rCard);
                        addLog(`🛡️ AI อัญเชิญ: ${rCard.name}`);
                        if (!rCard.isRest) reservedEssence += rCard.atkCost;
                    }
                } else {
                    break;
                }
            }
            updateUI(); checkWin();

            aiAttackQueue = [];
            if (eEss >= 1) aiAttackQueue.push({ type: 'leader', idx: 0, cost: 1, atk: 5000, name: eLeaderName });
            
            eField.forEach((c, idx) => {
                if (!c.isRest) {
                    aiAttackQueue.push({ type: 'warrior', idx: idx, cost: c.atkCost, atk: c.atk, name: c.name });
                }
            });
            aiAttackQueue.sort((a, b) => b.atk - a.atk);

            setTimeout(processAIAttackQueue, 1000);
        }

        function processAIAttackQueue() {
            if (!isPlayerTurn && aiAttackQueue.length > 0) {
                let attacker = aiAttackQueue.shift();
                
                if (attacker.type === 'warrior' && (!eField[attacker.idx] || eField[attacker.idx].name !== attacker.name || eField[attacker.idx].isRest)) {
                    return processAIAttackQueue();
                }

                if (eEss >= attacker.cost) {
                    let validTargets = pField.map((c, i) => (c.isRest && attacker.atk >= c.atk) ? i : -1).filter(i => i !== -1);
                    
                    if (validTargets.length > 0) {
                        eEss -= attacker.cost;
                        if (attacker.type === 'warrior') eField[attacker.idx].isRest = true;
                        updateUI();
                        let targetIdx = validTargets[Math.floor(Math.random() * validTargets.length)];
                        addLog(`⚔️ [${attacker.name}] โจมตีทหารของคุณ: ${pField[targetIdx].name}!`);
                        playSound('sfx-attack');
                        showDefenseOptions('warrior', targetIdx);
                    } else if (attacker.atk >= 5000) {
                        eEss -= attacker.cost;
                        if (attacker.type === 'warrior') eField[attacker.idx].isRest = true;
                        updateUI();
                        addLog(`⚔️ [${attacker.name}] สั่งโจมตีผู้นำของคุณ!`);
                        playSound('sfx-attack');
                        showDefenseOptions('leader', 0); 
                    } else {
                        addLog(`⚠️ [${attacker.name}] ATK ไม่พอโจมตีเป้าหมายใดๆ เลยผ่านเทิร์น!`);
                        processAIAttackQueue();
                    }
                } else {
                    processAIAttackQueue();
                }
            } else {
                addLog(`⏭️ AI จบเทิร์น`);
                updateUI();
                startPlayerTurn();
            }
        }

        function showDefenseOptions(type = 'leader', idx = 0) {
            currentDefenseTarget = { type, idx };
            const overlay = document.getElementById('defense-overlay');
            const options = document.getElementById('defense-options');
            overlay.style.display = 'flex'; options.innerHTML = '';
            pField.forEach((c, i) => { if(c.type === 'blocker' && !c.isRest) {
                let btn = document.createElement('button'); btn.style.background = 'var(--green)';
                btn.innerText = `🛡️ ${c.name}`; btn.onclick = () => { pField.splice(i, 1); resolveDefense(true); };
                options.appendChild(btn);
            }});
            pHand.forEach((c, i) => { if(c.counter) {
                let btn = document.createElement('button'); btn.style.background = 'var(--orange)';
                btn.innerText = `✨ C+${c.counter}`; btn.onclick = () => { pHand.splice(i, 1); resolveDefense(true); };
                options.appendChild(btn);
            }});
            let skip = document.createElement('button'); skip.style.background = '#444'; skip.style.color = "white";
            skip.innerText = "⚠️ ยอมรับ"; skip.onclick = () => resolveDefense(false);
            options.appendChild(skip);
        }

        function resolveDefense(success) {
            document.getElementById('defense-overlay').style.display = 'none';
            if(!success) {
                if (currentDefenseTarget.type === 'leader') {
                    pHP--;
                    showFloatingText('p-leader', "-1", "dmg");
                    addLog(`💔 คุณรับความเสียหาย! (เหลือ HP: ${pHP})`);
                } else {
                    showFloatingText(`p-unit-${currentDefenseTarget.idx}`, "DEAD", "dmg");
                    addLog(`☠️ ทหารของคุณถูกทำลาย!`);
                    pField.splice(currentDefenseTarget.idx, 1);
                }
            } else {
                addLog(`🛡️ คุณป้องกันการโจมตีสำเร็จ!`);
            }
            updateUI(); checkWin(); 
            setTimeout(processAIAttackQueue, 800);
        }

        function startPlayerTurn() {
            isPlayerTurn = true;
            if (pOrder === 2 && pMax === 0) pMax = 2; else pMax = Math.min(10, pMax + 2);
            pEss = pMax; pField.forEach(c => c.isRest = false);
            document.getElementById('p-leader').classList.remove('rest');
            
            addLog(`เทิร์นของคุณเริ่มต้น! ได้รับ +2 Essence (รวม ${pEss}/${pMax})`);
            drawCards(1);
            addLog(`🃏 คุณจั่วการ์ด 1 ใบ`);
            updateUI();
        }

        function endTurn() { 
            if(!isPlayerTurn) return; 
            isPlayerTurn = false; 
            addLog(`⏭️ คุณจบเทิร์น`);
            updateUI(); 
            setTimeout(enemyTurn, 1000); 
        }

        function playCard(idx) {
            let card = pHand[idx];
            if (card.type !== 'event' && pField.length >= 5) return;
            if (pEss < card.cost) return;
            
            pEss -= card.cost;
            pHand.splice(idx, 1);
            
            if (card.type === 'event') {
                resolveEvent(card);
            } else {
                card.isRest = !(card.skills && card.skills.includes('rush'));
                pField.push(card);
                addLog(`⛩️ คุณอัญเชิญ: ${card.name}`);
                
                if (card.skills && card.skills.includes('on_play:draw_1')) {
                    drawCards(1);
                    addLog(`✨ ${card.name} ทำงาน: จั่วการ์ด 1 ใบ!`);
                }
            }
            updateUI();
        }

        function resolveEvent(card) {
            addLog(`📜 ใช้เวทมนตร์: ${card.name}`);
            playSound('sfx-magic');
            if (card.effect === 'draw_2') {
                drawCards(2);
            } else if (card.effect === 'heal_1') {
                pHP = Math.min(5, pHP + 1);
                showFloatingText('p-leader', "+1", "heal");
                playSound('sfx-heal');
                addLog(`💖 ฟื้นฟู 1 HP!`);
            } else if (card.effect === 'board_wipe') {
                showFloatingText('e-leader', "🌊 ล้างบาง!", "dmg");
                eField = [];
                addLog(`🌊 ${card.name} กวาดล้างทหารศัตรูทั้งหมด!!`);
            }
        }

        function showFloatingText(targetId, text, type) {
            let el = document.getElementById(targetId);
            if (!el) return;
            let rect = el.getBoundingClientRect();
            let span = document.createElement('div');
            span.className = 'float-text';
            span.style.color = type === 'heal' ? 'var(--green)' : 'var(--red)';
            span.innerText = text;
            span.style.left = (rect.left + rect.width / 2 - 10) + 'px';
            span.style.top = (rect.top + rect.height / 2 - 10) + 'px';
            document.body.appendChild(span);
            setTimeout(() => span.remove(), 1000);
        }

        function drawCards(amount) {
            for(let i = 0; i < amount; i++) {
                if(pDeck <= 0) break;
                if(pHand.length < 8) pHand.push(pDeckArr.pop());
                pDeck--;
                playSound('sfx-draw');
            }
            checkWin();
        }

        function updateUI() {
            document.getElementById('e-hp-num').innerText = eHP;
            document.getElementById('p-hp-num').innerText = pHP;
            document.getElementById('e-hp-bar').style.width = (eHP/5*100)+'%';
            document.getElementById('p-hp-bar').style.width = (pHP/5*100)+'%';
            document.getElementById('p-ess-ui').innerText = `${pEss}/${pMax}`;
            document.getElementById('e-ess-ui').innerText = `${eEss}/${eMax}`;
            document.getElementById('p-deck-ui').innerText = pDeck;
            document.getElementById('e-deck-ui').innerText = eDeck;

            const pf = document.getElementById('p-units'); pf.innerHTML = '';
            pField.forEach((c, i) => {
                let isSelectedAttack = selected && selected.idx === i;
                pf.innerHTML += `<div id="p-unit-${i}" class="card ${c.isRest?'rest':''} ${isSelectedAttack?'is-attacking':''}" style="border-color:${c.faction==='china'?'var(--red)':'var(--blue)'}" onclick="onAttack('warrior', ${i})">
                    <img src="${c.img}"><div class="badge atk-cost">⚔️ ${c.atkCost}</div><div class="badge atk-val">${c.atk}</div>
                    ${c.type==='blocker'?'<div class="tag tag-blocker">BLOCK</div>':''}</div>`;
            });

            const ef = document.getElementById('e-units'); ef.innerHTML = '';
            eField.forEach((c, i) => {
                ef.innerHTML += `<div id="e-unit-${i}" class="card ${c.isRest?'rest':''} ${selected && c.isRest?'is-targetable':''}" style="border-color:${c.faction==='china'?'var(--red)':'var(--blue)'}" onclick="onTarget('warrior', ${i})">
                    <img src="${c.img}"><div class="badge atk-val">${c.atk}</div>
                    ${c.type==='blocker'?'<div class="tag tag-blocker">BLOCK</div>':''}</div>`;
            });

            const ph = document.getElementById('p-hand-ui'); ph.innerHTML = '';
            pHand.forEach((c, i) => {
                let badges = '';
                if (c.counter) badges += `<div class="tag tag-counter">C+${c.counter}</div>`;
                if (c.type === 'event') badges += `<div class="tag tag-event">EVENT</div>`;
                if (c.skills && c.skills.includes('rush')) badges += `<div class="tag tag-rush">RUSH</div>`;
                
                ph.innerHTML += `<div class="card" style="border-color:${c.faction==='china'?'var(--red)':'var(--blue)'}" onclick="playCard(${i})">
                    <div class="cost-val">${c.cost}</div><img src="${c.img}">
                    ${badges}</div>`;
            });

            document.getElementById('e-leader').className = `card leader-card ${selected?'is-targetable':''}`;
            document.getElementById('p-leader').classList.toggle('is-attacking', selected && selected.type==='leader');
        }

        function addLog(m) { const l = document.getElementById('battle-log'); l.innerHTML += `<br>> ${m}`; l.scrollTop = l.scrollHeight; }
        function checkWin() { 
            let msg = ""; let win = false;
            if(pDeck <= 0) msg = "คุณการ์ดหมดกอง! คุณแพ้!";
            else if(eDeck <= 0) { msg = "AI การ์ดหมดกอง! คุณชนะ!"; win = true; }
            else if(eHP<=0) { msg = "คุณชนะ!"; win = true; }
            else if(pHP<=0) msg = "คุณแพ้!";
            
            if(msg !== "") {
                document.getElementById('bgm-battle').pause();
                playSound(win ? 'bgm-win' : 'bgm-lose');
                setTimeout(() => {
                    alert(msg);
                    location.reload();
                }, 3000);
            }
        }
    </script>
</body>
</html>
