<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Gods War TCG</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; }
        .game-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .card { border: 2px solid #ffd700; border-radius: 10px; padding: 20px; background: #333; width: 150px; transition: 0.3s; }
        .card:hover { transform: scale(1.05); box-shadow: 0 0 15px #ffd700; }
        #battle-log { background: #000; color: #0f0; padding: 15px; width: 80%; max-width: 500px; margin: 20px auto; border-radius: 5px; height: 150px; overflow-y: auto; text-align: left; font-family: monospace; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #ffd700; border: none; border-radius: 5px; font-weight: bold; color: #000; }
        button:hover { background: #ffea00; }
    </style>
</head>
<body>
    <h1>Gods War: Battle Arena</h1>

    <div class="game-container">
        <div class="card">
            <h3>Sun Wukong</h3>
            <p>ATK: 6000</p>
        </div>

        <div style="font-size: 40px; align-self: center;">VS</div>

        <div class="card" style="border-color: #ff4d4d;">
            <h3>Zeus</h3>
            <p>HP: <span id="zeus-life">5</span></p>
        </div>
    </div>

    <button onclick="playTurn()">⚡ สั่งโจมตี!</button>

    <div id="battle-log">--- ระบบพร้อมประลอง ---</div>

    <script>
        // นี่คือ "สมอง" ที่ยกมาจาก game.js มาใส่ในหน้าเว็บ
        let zeusLife = 5;
        const wukongAtk = 6000;
        const zeusDef = 5000;

        function playTurn() {
            const log = document.getElementById('battle-log');
            const lifeDisplay = document.getElementById('zeus-life');

            if (zeusLife <= 0) {
                log.innerHTML += "<br>🎉 จบเกม! คุณชนะแล้ว!";
                return;
            }

            log.innerHTML += `<br>> Wukong โจมตีด้วยพลัง ${wukongAtk}...`;
            
            if (wukongAtk >= zeusDef) {
                zeusLife -= 1;
                lifeDisplay.innerText = zeusLife;
                log.innerHTML += "<br><span style='color: yellow;'>✅ สำเร็จ! Zeus เสีย Life 1 ดวง</span>";
            } else {
                log.innerHTML += "<br><span style='color: red;'>❌ ล้มเหลว! พลังป้องกันสูงเกินไป</span>";
            }

            // เลื่อน Log ลงล่างสุดอัตโนมัติ
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
