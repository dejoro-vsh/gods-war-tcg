<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Gods War: Hand System</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        
        /* สนามรบ */
        .battlefield { display: flex; justify-content: space-around; align-items: center; height: 300px; border-bottom: 2px ridge #444; margin-bottom: 20px; background: #252525; }
        
        /* การ์ดบนสนามและบนมือ */
        .card { width: 100px; height: 140px; border: 2px solid #ffd700; border-radius: 8px; background: #333; cursor: pointer; position: relative; font-size: 12px; display: inline-block; margin: 5px; vertical-align: top; }
        .card.enemy { border-color: #ff4d4d; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 5px 15px rgba(255,215,0,0.4); }
        
        /* ส่วนของมือผู้เล่น */
        .hand-container { background: #111; padding: 20px; min-height: 160px; border: 2px dashed #555; }
        
        /* ปุ่มและสถานะ */
        #battle-log { background: #000; color: #0f0; padding: 10px; height: 100px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .controls { margin-bottom: 10px; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; background: #ffd700; border: none; border-radius: 5px; }
        button:disabled { background: #555; cursor: not-allowed; }
        .stats { font-size: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Gods War: Arena</h1>
    
    <div class="stats">
        Enemy Zeus HP: <span id="zeus-life" style="color:#ff4d4d">5</span> | 
        Deck: <span id="deck-count">50</span> cards
    </div>

    <div id="battle-log">--- ยินดีต้อนรับสู่สนามรบ ---</div>

    <div class="controls">
        <button id="draw-btn" onclick="drawCard()">🎴 จั่วการ์ด</button>
    </div>

    <div class="battlefield">
        <div id="player-field">
            <p style="color:#666">สนามของคุณ (คลิกการ์ดบนมือเพื่อลงสนาม)</p>
        </div>
        <div style="font-size: 30px;">VS</div>
        <div class="card enemy">
            <h3>Zeus</h3>
            <p>DEF: 5000</p>
        </div>
    </div>

    <h3>การ์ดบนมือของคุณ (Hand)</h3>
    <div id="player-hand" class="hand-container">
        </div>

    <script>
        // 1. ข้อมูลการ์ด
        const cardTypes = [
            { name: "Wukong", atk: 6000 },
            { name: "Spartan", atk: 4000 },
            { name: "Centaur", atk: 4500 },
            { name: "Valkyrie", atk: 5000 }
        ];

        let deck = [];
        let hand = [];
        let zeusLife = 5;

        // 2. สร้างกองการ์ด 50 ใบ (สุ่ม)
        function initGame() {
            for (let i = 0; i < 50; i++) {
                let randomType = cardTypes[Math.floor(Math.random() * cardTypes.length)];
                deck.push({ ...randomType, id: i });
            }
            updateUI();
        }

        // 3. ฟังก์ชันจั่วการ์ด
        function drawCard() {
            if (deck.length > 0) {
                if (hand.length >= 5) {
                    addLog("มือเต็มแล้ว! (สูงสุด 5 ใบ)");
                    return;
                }
                let card = deck.pop();
                hand.push(card);
                addLog(`จั่วได้ ${card.name}`);
                updateUI();
            } else {
                addLog("การ์ดหมดกอง!");
            }
        }

        // 4. ฟังก์ชันลงการ์ด (Play Card) และโจมตีทันที
        function playCard(handIndex) {
            let card = hand[handIndex];
            
            // ย้ายจากมือไปสนาม (ในเวอร์ชันนี้เราจะจำลองการตีทันที)
            addLog(`ลงสนาม: ${card.name} และสั่งโจมตี!`);
            
            if (card.atk >= 5000) {
                zeusLife--;
                addLog(`✅ ${card.name} โจมตีเข้า! Zeus เสีย 1 HP`);
            } else {
                addLog(`❌ ${card.name} พลังไม่พอจะทะลวง Zeus!`);
            }
            
            // ลบการ์ดออกจากมือหลังจากใช้งาน
            hand.splice(handIndex, 1);
            
            if (zeusLife <= 0) {
                zeusLife = 0;
                addLog("🎉 คุณชนะสงครามเทพเจ้าแล้ว!");
            }
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('zeus-life').innerText = zeusLife;
            document.getElementById('deck-count').innerText = deck.length;
            
            // อัปเดตการ์ดบนมือ
            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = '';
            hand.forEach((card, index) => {
                handDiv.innerHTML += `
                    <div class="card" onclick="playCard(${index})">
                        <h4>${card.name}</h4>
                        <p>ATK: ${card.atk}</p>
                        <small style="color:yellow">คลิกเพื่อตี</small>
                    </div>
                `;
            });
        }

        function addLog(msg) {
            const log = document.getElementById('battle-log');
            log.innerHTML += `<br>> ${msg}`;
            log.scrollTop = log.scrollHeight;
        }

        // เริ่มเกม
        initGame();
    </script>
</body>
</html>
