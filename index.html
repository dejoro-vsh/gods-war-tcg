<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial War: Tactical Battle</title>
    <style>
        :root { --gold: #ffd700; --red: #ff4d4d; --blue: #00ccff; --bg: #0f0f0f; --green: #2ecc71; --orange: #e67e22; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow: hidden; }
        
        /* 1. หน้าจอแสดง HP Leader */
        .hp-container { width: 120px; background: #333; height: 10px; border-radius: 5px; margin: 5px auto; border: 1px solid #fff; }
        .hp-bar { height: 100%; background: var(--green); transition: 0.3s; border-radius: 5px; }
        .hp-text { font-size: 12px; font-weight: bold; color: var(--gold); }

        .header-stats { background: #000; padding: 15px; display: flex; justify-content: space-around; border-bottom: 2px solid var(--gold); }
        .info-bar { display: flex; justify-content: space-between; padding: 8px 40px; background: #1a0000; border-bottom: 1px solid #444; }

        .battlefield { display: grid; grid-template-rows: 1fr 1fr; gap: 20px; height: 460px; padding: 20px; background: radial-gradient(circle, #2a0000 0%, #0f0f0f 100%); }
        .field-zone { display: flex; gap: 20px; justify-content: center; align-items: center; min-height: 180px; }

        /* การ์ดและการแสดงผล */
        .card { width: 100px; height: 140px; border: 2px solid var(--gold); border-radius: 10px; background: #222; position: relative; cursor: pointer; transition: 0.3s; }
        .card img { width: 100%; height: 60%; object-fit: cover; border-radius: 8px 8px 0 0; }
        .rest { transform: rotate(90deg) !important; filter: brightness(0.5); }
        
        /* สถานะการคลิก */
        .selected-to-attack { border: 4px solid var(--blue) !important; box-shadow: 0 0 20px var(--blue); transform: translateY(-10px); }
        .can-be-targeted { border: 4px solid var(--red) !important; animation: pulse-red 0.8s infinite; }
        @keyframes pulse-red { 50% { box-shadow: 0 0 25px var(--red); } }

        /* Badge ต่างๆ */
        .badge { position: absolute; padding: 2px 5px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #000; }
        .atk-cost { bottom: 5px; left: 5px; background: var(--gold); color: #000; }
        .atk-val { bottom: 5px; right: 5px; background: var(--red); color: #fff; }
        .cost-val { top: -8px; left: -8px; background: var(--blue); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }

        /* สัญลักษณ์ Blocker / Counter */
        .ability-tag { position: absolute; top: 5px; right: 5px; font-size: 9px; padding: 2px 4px; border-radius: 3px; font-weight: bold; }
        .tag-blocker { background: var(--green); color: black; }
        .tag-counter { background: var(--orange); color: white; }

        #battle-log { background: #000; color: #0f0; padding: 10px; height: 80px; overflow-y: auto; font-family: monospace; border-top: 1px solid var(--gold); text-align: left; }
        .controls { padding: 10px; background: #111; }
        button { padding: 8px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; margin: 0 5px; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div id="enemy-leader-zone">
            <div class="hp-text">🔱 ZEUS HP</div>
            <div class="hp-container"><div id="e-hp-bar" class="hp-bar" style="width: 100%;"></div></div>
            <span id="e-hp-num">5</span>/5
        </div>
        
        <div id="player-leader-zone">
            <div class="hp-text">⛩️ JADE EMPEROR HP</div>
            <div class="hp-container"><div id="p-hp-bar" class="hp-bar" style="width: 100%;"></div></div>
            <span id="p-hp-num">5</span>/5
        </div>
    </div>

    <div class="info-bar">
        <div>🎴 GREEK: <span id="e-deck">50</span></div>
        <div style="color:var(--gold)">ESSENCE: <span id="p-essence-active">0</span> / <span id="p-essence-total">0</span></div>
        <div>🎴 CHINA: <span id="p-deck">50</span></div>
    </div>

    <div class="battlefield">
        <div class="field-zone">
            <div id="e-leader-card" class="card" onclick="handleTargetClick('leader', 0)">
                <img src="https://res.cloudinary.com/dju44op8w/image/upload/v1777467100/Gemini_Generated_Image_y35m84y35m84y35m_phm30l.jpg">
                <div class="badge atk-cost">⚔️ 1</div><div class="badge atk-val">5000</div>
            </div>
            <div id="e-field-ui" style="display:flex; gap:10px;"></div>
        </div>

        <div class="field-zone">
            <div id="p-field-ui" style="display:flex; gap:10px;"></div>
            <div id="p-leader-card" class="card" onclick="handleAttackerClick('leader', 0)">
                <img src="https://res.cloudinary.com/dju44op8w/image/upload/v1777472385/Gemini_Generated_Image_lkkjkalkkjkalkkj_y9swsw.jpg">
                <div class="badge atk-cost">⚔️ 1</div><div class="badge atk-val">5000</div>
            </div>
        </div>
    </div>

    <div id="battle-log">> ยินดีต้อนรับ! กรุณากด "เริ่มเกม"</div>
    
    <div class="controls">
        <button id="start-btn" style="background:var(--green)" onclick="initGame()">🎮 เริ่มเกม (จั่วไพ่)</button>
        <button style="background:var(--red); color:white" onclick="endTurn()">⏭️ จบเทิร์น</button>
    </div>

    <div id="p-hand-ui" class="field-zone" style="background:rgba(0,0,0,0.5); min-height:150px; border-top: 2px solid #333;"></div>

    <script>
        const cardsData = [
            { name: "Wukong", atk: 6000, cost: 5, atkCost: 2, type: "warrior", img: "https://res.cloudinary.com/dju44op8w/image/upload/v1777467648/Gemini_Generated_Image_4wo9z44wo9z44wo9_ry0w3f.jpg" },
            { name: "Erlang", atk: 4000, cost: 2, atkCost: 1, type: "blocker", img: "https://res.cloudinary.com/dju44op8w/image/upload/v1777472457/Gemini_Generated_Image_s7osias7osias7os_fabxbv.jpg" },
            { name: "Nezha", atk: 5000, cost: 3, atkCost: 1, type: "counter", counterVal: 2000, img: "https://res.cloudinary.com/dju44op8w/image/upload/v1777472501/Gemini_Generated_Image_m8c3vam8c3vam8c3_pqnpqt.jpg" }
        ];

        let pLife = 5, eLife = 5, pEssence = 0, pMax = 1, isPlayerTurn = true;
        let pDeck = [], pHand = [], pField = [], eField = [];
        let selectedAttacker = null; // เก็บข้อมูลตัวที่จะใช้ตี {type, index, cost}

        function initGame() {
            pDeck = Array.from({length: 50}, () => ({...cardsData[Math.floor(Math.random()*3)], isRest: false}));
            pHand = pDeck.splice(0, 5);
            pEssence = 1; pMax = 1;
            document.getElementById('start-btn').style.display = 'none';
            addLog("🧧 เริ่มศึก! คุณได้รับ 1 Essence และไพ่ 5 ใบ");
            updateUI();
        }

        // --- ระบบ 2 คลิก: คลิก 1 เลือกตัวตี ---
        function handleAttackerClick(type, idx) {
            if (!isPlayerTurn || selectedAttacker) {
                if (selectedAttacker) cancelSelection();
                return;
            }

            let card = (type === 'leader') ? { name: "Leader", atkCost: 1, isRest: document.getElementById('p-leader-card').classList.contains('rest') } : pField[idx];

            if (card.isRest) { addLog("❌ การ์ดใบนี้พักอยู่ (นอน) โจมตีไม่ได้"); return; }
            if (pEssence < card.atkCost) { addLog("❌ Essence ไม่พอสั่งโจมตี"); return; }

            selectedAttacker = { type, idx, atkCost: card.atkCost };
            addLog(`🎯 เลือก [${card.name}] แล้ว! คลิกที่ Leader ศัตรูหรือทหารที่นอนอยู่เพื่อโจมตี`);
            updateUI();
        }

        // --- ระบบ 2 คลิก: คลิก 2 เลือกเป้าหมาย ---
        function handleTargetClick(targetType, targetIdx) {
            if (!selectedAttacker) return;

            let targetName = (targetType === 'leader') ? "Zeus" : eField[targetIdx].name;
            
            // เช็คเงื่อนไข: ตี Leader ได้ตลอด หรือ ตีทหารที่นอนอยู่เท่านั้น
            if (targetType === 'warrior' && !eField[targetIdx].isRest) {
                addLog("❌ โจมตีทหารที่ตั้งอยู่ไม่ได้! ต้องตีตัวที่นอน (Rest) เท่านั้น");
                cancelSelection();
                return;
            }

            // จ่ายค่าตี
            pEssence -= selectedAttacker.atkCost;
            
            // สั่งการ์ดตัวเอง "นอน"
            if (selectedAttacker.type === 'leader') {
                document.getElementById('p-leader-card').classList.add('rest');
            } else {
                pField[selectedAttacker.index].isRest = true;
            }

            // คำนวณดาเมจ
            if (targetType === 'leader') {
                eLife--;
                addLog(`💥 โจมตีสำเร็จ! ${targetName} สูญเสีย HP`);
            } else {
                addLog(`⚔️ ปะทะ! ทำลาย ${targetName} สำเร็จ`);
                eField.splice(targetIdx, 1);
            }

            selectedAttacker = null;
            updateUI();
            checkWin();
        }

        function cancelSelection() {
            selectedAttacker = null;
            addLog("ยกเลิกการเลือก");
            updateUI();
        }

        function playCard(idx) {
            let card = pHand[idx];
            if (pEssence < card.cost) return;
            pEssence -= card.cost;
            pField.push(pHand.splice(idx, 1)[0]);
            updateUI();
        }

        function endTurn() {
            isPlayerTurn = false;
            addLog("💤 จบเทิร์น... รอ Zeus ดำเนินการ");
            setTimeout(() => {
                isPlayerTurn = true;
                pMax = Math.min(10, pMax + 2);
                pEssence = pMax;
                // รีเซ็ตสถานะนอนให้เป็นตั้ง
                pField.forEach(c => c.isRest = false);
                document.getElementById('p-leader-card').classList.remove('rest');
                if (pDeck.length > 0) pHand.push(pDeck.pop());
                addLog(`✨ เริ่มเทิร์นใหม่! ได้รับ ${pMax} Essence`);
                updateUI();
            }, 1000);
        }

        function updateUI() {
            // อัปเดต HP Leader
            document.getElementById('e-hp-bar').style.width = (eLife / 5 * 100) + "%";
            document.getElementById('e-hp-num').innerText = eLife;
            document.getElementById('p-hp-bar').style.width = (pLife / 5 * 100) + "%";
            document.getElementById('p-hp-num').innerText = pLife;

            document.getElementById('p-essence-active').innerText = pEssence;
            document.getElementById('p-essence-total').innerText = pMax;

            // ไฮไลท์ตัวที่จะตี (คลิก 1)
            document.getElementById('p-leader-card').className = `card ${selectedAttacker?.type === 'leader' ? 'selected-to-attack' : ''}`;
            
            // ไฮไลท์เป้าหมาย (คลิก 2)
            document.getElementById('e-leader-card').className = `card ${selectedAttacker ? 'can-be-targeted' : ''}`;

            // วาดสนาม Player
            const pFieldUI = document.getElementById('p-field-ui');
            pFieldUI.innerHTML = '';
            pField.forEach((c, i) => {
                const isSel = (selectedAttacker?.type === 'warrior' && selectedAttacker.idx === i);
                pFieldUI.innerHTML += `
                    <div class="card ${c.isRest ? 'rest' : ''} ${isSel ? 'selected-to-attack' : ''}" onclick="handleAttackerClick('warrior', ${i})">
                        <img src="${c.img}">
                        <div class="badge atk-cost">⚔️ ${c.atkCost}</div>
                        <div class="badge atk-val">${c.atk}</div>
                        ${c.type === 'blocker' ? '<div class="ability-tag tag-blocker">BLOCKER</div>' : ''}
                    </div>`;
            });

            // วาดมือ
            const pHandUI = document.getElementById('p-hand-ui');
            pHandUI.innerHTML = '';
            pHand.forEach((c, i) => {
                pHandUI.innerHTML += `
                    <div class="card" onclick="playCard(${i})">
                        <div class="badge cost-val">${c.cost}</div>
                        <img src="${c.img}">
                        <div class="badge atk-val">${c.atk}</div>
                        ${c.counterVal ? `<div class="ability-tag tag-counter">C+${c.counterVal}</div>` : ''}
                    </div>`;
            });
        }

        function addLog(msg) {
            const log = document.getElementById('battle-log');
            log.innerHTML += `<br>> ${msg}`;
            log.scrollTop = log.scrollHeight;
        }

        function checkWin() {
            if (eLife <= 0) alert("ยินดีด้วย! คุณปราบ Zeus ได้แล้ว");
            if (pLife <= 0) alert("พ่ายแพ้! Zeus ครอบครองสวรรค์");
        }
    </script>
</body>
</html>
