<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gods War: Essence Era</title>
    <style>
        :root {
            --gold: #ffd700;
            --red: #ff4d4d;
            --purple: #bf00ff;
            --blue: #00ccff;
            --bg: #0a0a0a;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0;
        }

        .header-stats { 
            background: #000; 
            padding: 15px; 
            display: flex; 
            justify-content: space-around; 
            font-size: 18px;
            border-bottom: 3px solid var(--gold);
        }

        /* ระบบ Essence UI */
        .essence-bar {
            background: #111;
            padding: 10px;
            font-size: 20px;
            color: var(--blue);
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        .battlefield { 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            height: 350px; 
            background: radial-gradient(circle, #222 0%, #0a0a0a 100%);
        }

        .card { 
            width: 120px; height: 175px; 
            border: 2px solid var(--gold); 
            border-radius: 12px; 
            background: #222;
            display: inline-block; 
            margin: 10px;
            cursor: pointer; 
            position: relative;
            transition: 0.3s;
        }
        
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 70%; object-fit: cover; }
        
        /* สัญลักษณ์ค่าร่าย (Cost) */
        .cost-badge {
            position: absolute; top: -5px; left: -5px;
            background: var(--blue); color: white;
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 2px solid white; box-shadow: 0 0 10px var(--blue);
        }

        .atk-badge { 
            position: absolute; bottom: 5px; right: 5px; 
            background: var(--red); color: white; 
            padding: 2px 6px; border-radius: 4px; font-weight: bold;
        }

        .card.SR { border-color: var(--purple); box-shadow: 0 0 15px var(--purple); animation: sr-glow 2s infinite; }
        @keyframes sr-glow { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }

        .hand-container { background: rgba(0,0,0,0.5); padding: 20px; min-height: 180px; display: flex; justify-content: center; }
        
        #battle-log { background: #000; color: #0f0; padding: 10px; height: 80px; overflow-y: auto; font-family: monospace; text-align: left; }
        
        .controls { padding: 15px; background: #111; }
        button { padding: 10px 25px; font-size: 16px; background: var(--gold); border: none; border-radius: 20px; font-weight: bold; cursor: pointer; margin: 5px; }
        button:disabled { background: #444; cursor: not-allowed; }

        .zeus-dead { filter: grayscale(100%) brightness(0.3); transform: rotate(10deg); }
    </style>
</head>
<body>

    <div class="header-stats">
        <div>🔱 Zeus HP: <span id="zeus-life" style="color:var(--red)">5</span></div>
        <div>🎴 Deck: <span id="deck-count">50</span></div>
        <div>⌛ Turn: <span id="turn-count">1</span></div>
    </div>

    <div class="essence-bar">
        💎 Essence: <span id="current-essence">1</span> / <span id="max-essence">1</span>
    </div>

    <div class="battlefield">
        <div id="zeus-card" class="card" style="border-color:var(--red); width: 140px; height: 200px;">
            <img src="https://res.cloudinary.com/dju440p8w/image/upload/v1777467100/Gemini_Generated_Image_y35m84y35m84y35m_phm30l.jpg">
            <div style="font-size: 12px; padding: 5px;">ZEUS [BOSS]</div>
            <div class="atk-badge">DEF: 5000</div>
        </div>
    </div>

    <div id="battle-log">--- เริ่มต้นสงคราม ---</div>

    <div class="controls">
        <button id="draw-btn" onclick="drawCard()">🎴 จั่วการ์ด</button>
        <button id="end-turn-btn" onclick="endTurn()" style="background: #444; color: white;">⏭️ จบเทิร์น</button>
        <button onclick="resetGame()">🔄 Reset</button>
    </div>

    <div class="hand-container" id="player-hand"></div>

    <script>
        const cardTypes = [
            { name: "Wukong", atk: 6000, cost: 5, rarity: "SR", img: "https://res.cloudinary.com/dju440p8w/image/upload/v1777467648/Gemini_Generated_Image_4wo9z44wo9z44wo9_ry0w3f.jpg" },
            { name: "Spartan", atk: 4000, cost: 1, rarity: "C", img: "https://res.cloudinary.com/dju440p8w/image/upload/v1777467845/Gemini_Generated_Image_b5bzkyb5bzkyb5bz_dufa4t.jpg" },
            { name: "Valkyrie", atk: 5500, cost: 3, rarity: "R", img: "https://res.cloudinary.com/dju440p8w/image/upload/v1777467981/Gemini_Generated_Image_kefxgakefxgakefx_plgdep.jpg" },
            { name: "Centaur", atk: 4500, cost: 2, rarity: "C", img: "https://res.cloudinary.com/dju440p8w/image/upload/v1777468077/Gemini_Generated_Image_3bqflw3bqflw3bqf_eq9uny.jpg" }
        ];

        let deck = [], hand = [], zeusLife = 5;
        let maxEssence = 1, currentEssence = 1, turn = 1;

        function initGame() {
            deck = []; hand = []; zeusLife = 5;
            maxEssence = 1; currentEssence = 1; turn = 1;
            for (let i = 0; i < 50; i++) {
                let roll = Math.random() * 100;
                let c = roll < 12 ? cardTypes[0] : roll < 40 ? cardTypes[2] : (Math.random() > 0.5 ? cardTypes[1] : cardTypes[3]);
                deck.push({ ...c, id: i });
            }
            addLog("🎮 เริ่มเทิร์นที่ 1");
            updateUI();
        }

        function endTurn() {
            if (zeusLife <= 0) return;
            turn++;
            if (maxEssence < 10) maxEssence++; // เพิ่ม Mana สูงสุดทีละ 1 (ตันที่ 10)
            currentEssence = maxEssence; // รีฟิล Mana เต็ม
            addLog(`--- เทิร์นที่ ${turn} (Essence +1) ---`);
            drawCard(); // จั่วอัตโนมัติเมื่อเริ่มเทิร์น
            updateUI();
        }

        function drawCard() {
            if (hand.length < 6 && deck.length > 0) {
                hand.push(deck.pop());
                updateUI();
            }
        }

        function playCard(index) {
            const card = hand[index];
            if (currentEssence < card.cost) {
                addLog(`❌ พลังงานไม่พอ! ต้องการ ${card.cost} 💎`);
                return;
            }

            currentEssence -= card.cost;
            addLog(`⚡ ใช้ ${card.name} (จ่าย ${card.cost} 💎)`);
            
            if (card.atk >= 5000) {
                zeusLife--;
                addLog(`✅ Zeus บาดเจ็บ!`);
            } else {
                addLog(`❌ พลังไม่พอตี Zeus`);
            }

            hand.splice(index, 1);
            updateUI();

            if (zeusLife <= 0) {
                zeusLife = 0;
                addLog("🏆 คุณชนะ!");
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('zeus-life').innerText = zeusLife;
            document.getElementById('deck-count').innerText = deck.length;
            document.getElementById('turn-count').innerText = turn;
            document.getElementById('max-essence').innerText = maxEssence;
            document.getElementById('current-essence').innerText = currentEssence;
            
            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = '';
            hand.forEach((card, i) => {
                const canPlay = currentEssence >= card.cost ? '' : 'opacity: 0.5; filter: grayscale(1);';
                handDiv.innerHTML += `
                    <div class="card ${card.rarity}" onclick="playCard(${i})" style="${canPlay}">
                        <div class="cost-badge">${card.cost}</div>
                        <img src="${card.img}">
                        <div style="font-size:10px; padding:2px;"><b>${card.name}</b></div>
                        <div class="atk-badge">${card.atk}</div>
                    </div>
                `;
            });

            if (zeusLife <= 0) document.getElementById('zeus-card').classList.add('zeus-dead');
            else document.getElementById('zeus-card').classList.remove('zeus-dead');
        }

        function addLog(msg) {
            const log = document.getElementById('battle-log');
            log.innerHTML += `<br>> ${msg}`;
            log.scrollTop = log.scrollHeight;
        }

        function resetGame() { if(confirm("เริ่มใหม่?")) initGame(); }
        initGame();
    </script>
</body>
</html>
