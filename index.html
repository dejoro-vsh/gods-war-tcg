<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Celestial War: Mobile Edition</title>
    <style>
        :root { --gold: #ffd700; --red: #ff4d4d; --blue: #00ccff; --bg: #0a0a0a; --green: #2ecc71; --orange: #e67e22; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header - ปรับให้เล็กลงประหยัดที่ */
        .header-stats { background: #000; padding: 8px; display: flex; justify-content: space-around; border-bottom: 2px solid var(--gold); flex-shrink: 0; }
        .hp-box { font-size: 14px; font-weight: bold; width: 45%; }
        .hp-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 4px; border: 1px solid #555; }
        .hp-bar-fill { height: 100%; background: var(--green); transition: 0.3s; }

        /* Essence Info - ปรับให้ดูโมเดิร์นบนมือถือ */
        .info-bar { display: flex; justify-content: space-between; padding: 5px 15px; background: #1a0505; border-bottom: 1px solid #333; align-items: center; font-size: 12px; flex-shrink: 0; }
        .ess-monitor { font-weight: bold; padding: 4px 10px; border-radius: 6px; border: 1px solid; min-width: 90px; text-align: center; }
        .ess-p { border-color: var(--blue); color: var(--blue); }
        .ess-e { border-color: var(--red); color: var(--red); }

        /* Battlefield - พื้นที่หลักสำหรับการเล่น */
        .battlefield { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; background: radial-gradient(circle at center, #200 0%, #0a0a0a 100%); overflow: hidden; }
        .field-zone { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; min-height: 140px; width: 100%; border: 1px solid rgba(255,215,0,0.05); border-radius: 12px; padding: 5px; }

        /* Card System - ปรับขนาดให้เหมาะกับจอเล็ก */
        .card { width: 75px; height: 110px; border: 2px solid var(--gold); border-radius: 8px; background: #111; position: relative; cursor: pointer; transition: 0.1s; flex-shrink: 0; }
        .card img { width: 100%; height: 55%; object-fit: cover; border-radius: 6px 6px 0 0; }
        .rest { transform: rotate(90deg) scale(0.85) !important; filter: brightness(0.4); }
        
        /* Badges */
        .badge { position: absolute; padding: 1px 3px; border-radius: 3px; font-size: 9px; font-weight: bold; border: 1px solid #000; }
        .cost-val { top: -6px; left: -6px; background: var(--blue); width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid white; color: white; font-size: 10px; }
        .atk-cost { bottom: 3px; left: 3px; background: var(--gold); color: #000; }
        .atk-val { bottom: 3px; right: 3px; background: var(--red); color: white; }
        .tag { position: absolute; top: 3px; right: 3px; font-size: 7px; padding: 1px 3px; border-radius: 2px; font-weight: bold; }
        .tag-blocker { background: var(--green); color: black; }
        .tag-counter { background: var(--orange); color: white; }
        .tag-event { background: #8e44ad; color: white; left: 3px; bottom: 3px; top: auto; right: auto; }
        .tag-rush { background: var(--red); color: white; left: 3px; top: 3px; right: auto; }

        /* Highlights */
        .is-attacking { border: 3px solid var(--blue) !important; box-shadow: 0 0 15px var(--blue); transform: scale(1.05); z-index: 5; }
        .is-targetable { border: 3px solid var(--red) !important; animation: pulse-red 0.8s infinite; }
        @keyframes pulse-red { 50% { box-shadow: 0 0 15px var(--red); } }

        /* Hand Container - เลื่อนซ้ายขวาได้ */
        .hand-container { background: rgba(0,0,0,0.7); padding: 10px; display: flex; gap: 10px; overflow-x: auto; min-height: 130px; border-top: 1px solid var(--gold); -webkit-overflow-scrolling: touch; flex-shrink: 0; }
        
        /* Log & Controls */
        #battle-log { background: #000; color: #0f0; padding: 8px; height: 60px; overflow-y: auto; font-family: monospace; font-size: 11px; flex-shrink: 0; }
        .controls { padding: 8px; background: #111; display: flex; justify-content: center; gap: 10px; flex-shrink: 0; }
        button { padding: 10px 15px; font-size: 13px; font-weight: bold; border-radius: 15px; border: none; cursor: pointer; }

        #defense-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .leader-card { width: 85px; height: 125px; border-width: 3px; }
    </style>
</head>
<body>

    <div id="defense-overlay">
        <h3 style="color:var(--red); margin-bottom:20px;">🚨 ถูกโจมตี! เลือกการป้องกัน</h3>
        <div id="defense-options" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
    </div>

    <div class="header-stats">
        <div class="hp-box">🔱 ZEUS: <span id="e-hp-num">5</span> HP <div class="hp-bar-bg"><div id="e-hp-bar" class="hp-bar-fill"></div></div></div>
        <div class="hp-box">⛩️ YOU: <span id="p-hp-num">5</span> HP <div class="hp-bar-bg"><div id="p-hp-bar" class="hp-bar-fill"></div></div></div>
    </div>

    <div class="info-bar">
        <div class="ess-monitor ess-e">Z: <span id="e-ess-ui">0/0</span></div>
        <div style="font-size: 10px; opacity: 0.6;">D: <span id="e-deck">50</span> | <span id="p-deck">50</span></div>
        <div class="ess-monitor ess-p">P: <span id="p-ess-ui">0/0</span></div>
    </div>

    <div class="battlefield">
        <div id="e-field-zone" class="field-zone">
            <div id="e-leader" class="card leader-card" onclick="onTarget('leader', 0)" style="border-color:var(--red)">
                <img src="https://res.cloudinary.com/dju44op8w/image/upload/v1777467100/Gemini_Generated_Image_y35m84y35m84y35m_phm30l.jpg">
                <div class="badge atk-cost">⚔️ 1</div><div class="badge atk-val">5000</div>
            </div>
            <div id="e-units" style="display:flex; gap:8px;"></div>
        </div>

        <div id="p-field-zone" class="field-zone">
            <div id="p-units" style="display:flex; gap:8px;"></div>
            <div id="p-leader" class="card leader-card" onclick="onAttack('leader', 0)" style="border-color:var(--blue)">
                <img src="https://res.cloudinary.com/dju44op8w/image/upload/v1777472385/Gemini_Generated_Image_lkkjkalkkjkalkkj_y9swsw.jpg">
                <div class="badge atk-cost">⚔️ 1</div><div class="badge atk-val">5000</div>
            </div>
        </div>
    </div>

    <div id="battle-log">> เลือกฝ่ายเพื่อเริ่ม...</div>
    
    <div class="controls">
        <div id="start-buttons">
            <button style="background:var(--gold)" onclick="startGame(true)">จีนเริ่มก่อน</button>
            <button style="background:var(--red); color:white" onclick="startGame(false)">กรีกเริ่มก่อน</button>
        </div>
        <button id="end-btn" style="display:none; background:var(--red); color:white;" onclick="endTurn()">⏭️ จบเทิร์น</button>
    </div>

    <div id="p-hand-ui" class="hand-container"></div>

    <script src="./js/cards.js"></script>
    <script>
        const chinaCards = window.CardDatabase.chinaCards;
        const greekCards = window.CardDatabase.greekCards;

        let pHP = 5, eHP = 5, pEss = 0, pMax = 0, eEss = 0, eMax = 0, isPlayerTurn = true, pOrder = 1;
        let pHand = [], pField = [], eField = [], selected = null;

        function startGame(first) {
            document.getElementById('start-buttons').style.display = 'none';
            document.getElementById('end-btn').style.display = 'block';
            pOrder = first ? 1 : 2; isPlayerTurn = first;
            pHand = []; drawCards(5);
            addLog(`🎮 เริ่มเกม! ${first ? "คุณ (จีน) เริ่มก่อน" : "ซุส (กรีก) เริ่มก่อน"}`);
            if(first) { pMax = 1; pEss = 1; eMax = 0; eEss = 0; addLog("⛩️ เทิร์นแรกของคุณ ได้รับ 1 Essence"); } 
            else { eMax = 1; eEss = 1; pMax = 0; pEss = 0; addLog("⚡ เทิร์นแรกของซุส ได้รับ 1 Essence"); setTimeout(enemyTurn, 1000); }
            updateUI();
        }

        function onAttack(type, idx) {
            if (!isPlayerTurn || selected) { selected = null; updateUI(); return; }
            let card = (type === 'leader') ? { name: "เง็กเซียน", atkCost: 1, isRest: document.getElementById('p-leader').classList.contains('rest') } : pField[idx];
            if (card.isRest || pEss < card.atkCost) return;
            selected = { type, idx, atkCost: card.atkCost };
            updateUI();
        }

        function onTarget(type, idx) {
            if (!selected) return;
            let target = (type === 'leader') ? { name: "Zeus" } : eField[idx];
            if (type !== 'leader' && !target.isRest) { selected = null; updateUI(); return; }
            pEss -= selected.atkCost;
            let attacker = (selected.type === 'leader') ? "เง็กเซียน" : pField[selected.idx].name;
            addLog(`💥 ${attacker} โจมตีใส่ ${target.name}!`);

            if (selected.type === 'leader') document.getElementById('p-leader').classList.add('rest');
            else pField[selected.idx].isRest = true;
            
            setTimeout(() => {
                let blockerIdx = eField.findIndex(c => c.type === 'blocker' && !c.isRest);
                if(blockerIdx !== -1) { eField.splice(blockerIdx, 1); addLog("🛡️ บล็อก!"); }
                else { if (type === 'leader') eHP--; else eField.splice(idx, 1); }
                selected = null; updateUI(); checkWin();
            }, 500);
        }

        function enemyTurn() {
            if (eMax === 0) eMax = 2; else eMax = Math.min(10, eMax + 2);
            eEss = eMax;
            eField.forEach(c => c.isRest = false);
            
            addLog(`⚡ ซุสเข้าสู่เทิร์น! ได้รับ +2 Essence (รวม ${eEss}/${eMax})`);

            if(eField.length < 3) {
                let rCard = greekCards[Math.floor(Math.random() * greekCards.length)];
                if (rCard.type === 'event') {
                    if (eEss >= rCard.cost) {
                        eEss -= rCard.cost;
                        addLog(`📜 ซุสใช้เวทมนตร์: ${rCard.name}`);
                        if (rCard.effect === 'heal_1') {
                            eHP = Math.min(5, eHP + 1);
                            addLog(`💖 ซุสฟื้นฟู 1 HP!`);
                        } else if (rCard.effect === 'ai_summon') {
                            addLog(`✨ พลังนิมิต! ซุสเรียกทหารเพิ่ม 1 ตัว!`);
                            let unit = greekCards.find(c => c.type !== 'event');
                            eField.push({...unit, isRest: true});
                        }
                    }
                } else {
                    if (eEss >= rCard.cost) {
                        eEss -= rCard.cost;
                        eField.push({...rCard, isRest: true});
                        addLog(`🛡️ ซุสอัญเชิญ: ${rCard.name}`);
                    }
                }
            }
            updateUI();

            setTimeout(() => { 
                if(eEss >= 1) {
                    addLog(`⚔️ ซุสสั่งโจมตีคุณ! (ใช้ 1 Essence)`);
                    showDefenseOptions(); 
                } else {
                    addLog(`⏭️ ซุสจบเทิร์น`);
                    startPlayerTurn(); 
                }
            }, 1500);
        }

        function showDefenseOptions() {
            const overlay = document.getElementById('defense-overlay');
            const options = document.getElementById('defense-options');
            overlay.style.display = 'flex'; options.innerHTML = '';
            pField.forEach((c, i) => { if(c.type === 'blocker' && !c.isRest) {
                let btn = document.createElement('button'); btn.style.background = 'var(--green)';
                btn.innerText = `🛡️ ${c.name}`; btn.onclick = () => { pField.splice(i, 1); resolveDefense(true); };
                options.appendChild(btn);
            }});
            pHand.forEach((c, i) => { if(c.counter) {
                let btn = document.createElement('button'); btn.style.background = 'var(--orange)';
                btn.innerText = `✨ C+${c.counter}`; btn.onclick = () => { pHand.splice(i, 1); resolveDefense(true); };
                options.appendChild(btn);
            }});
            let skip = document.createElement('button'); skip.style.background = '#444'; skip.style.color = "white";
            skip.innerText = "⚠️ ยอมรับ"; skip.onclick = () => resolveDefense(false);
            options.appendChild(skip);
        }

        function resolveDefense(success) {
            document.getElementById('defense-overlay').style.display = 'none';
            if(!success) {
                pHP--;
                addLog(`💔 คุณรับความเสียหาย! (เหลือ HP: ${pHP})`);
            } else {
                addLog(`🛡️ คุณป้องกันการโจมตีสำเร็จ!`);
            }
            updateUI(); checkWin(); setTimeout(startPlayerTurn, 500);
        }

        function startPlayerTurn() {
            isPlayerTurn = true;
            if (pOrder === 2 && pMax === 0) pMax = 2; else pMax = Math.min(10, pMax + 2);
            pEss = pMax; pField.forEach(c => c.isRest = false);
            document.getElementById('p-leader').classList.remove('rest');
            
            addLog(`⛩️ เทิร์นของคุณเริ่มต้น! ได้รับ +2 Essence (รวม ${pEss}/${pMax})`);
            drawCards(1);
            addLog(`🃏 คุณจั่วการ์ด 1 ใบ`);
            updateUI();
        }

        function endTurn() { 
            if(!isPlayerTurn) return; 
            isPlayerTurn = false; 
            addLog(`⏭️ คุณจบเทิร์น`);
            updateUI(); 
            setTimeout(enemyTurn, 1000); 
        }

        function playCard(idx) {
            let card = pHand[idx];
            if (card.type !== 'event' && pField.length >= 5) return;
            if (pEss < card.cost) return;
            
            pEss -= card.cost;
            pHand.splice(idx, 1);
            
            if (card.type === 'event') {
                resolveEvent(card);
            } else {
                card.isRest = !(card.skills && card.skills.includes('rush'));
                pField.push(card);
                addLog(`⛩️ คุณอัญเชิญ: ${card.name}`);
                
                if (card.skills && card.skills.includes('on_play:draw_1')) {
                    drawCards(1);
                    addLog(`✨ ${card.name} ทำงาน: จั่วการ์ด 1 ใบ!`);
                }
            }
            updateUI();
        }

        function resolveEvent(card) {
            addLog(`📜 ใช้เวทมนตร์: ${card.name}`);
            if (card.effect === 'draw_2') {
                drawCards(2);
            } else if (card.effect === 'heal_1') {
                pHP = Math.min(5, pHP + 1);
                addLog(`💖 ฟื้นฟู 1 HP!`);
            }
        }

        function drawCards(amount) {
            for(let i = 0; i < amount; i++) {
                if(pHand.length < 8) pHand.push({...chinaCards[Math.floor(Math.random() * chinaCards.length)], id: Math.random()});
            }
        }

        function updateUI() {
            document.getElementById('e-hp-num').innerText = eHP;
            document.getElementById('p-hp-num').innerText = pHP;
            document.getElementById('e-hp-bar').style.width = (eHP/5*100)+'%';
            document.getElementById('p-hp-bar').style.width = (pHP/5*100)+'%';
            document.getElementById('p-ess-ui').innerText = `${pEss}/${pMax}`;
            document.getElementById('e-ess-ui').innerText = `${eEss}/${eMax}`;

            const pf = document.getElementById('p-units'); pf.innerHTML = '';
            pField.forEach((c, i) => {
                pf.innerHTML += `<div class="card ${c.isRest?'rest':''} ${selected?.idx===i?'is-attacking':''}" onclick="onAttack('warrior', ${i})">
                    <img src="${c.img}"><div class="badge atk-cost">⚔️ ${c.atkCost}</div><div class="badge atk-val">${c.atk}</div>
                    ${c.type==='blocker'?'<div class="tag tag-blocker">BLOCK</div>':''}</div>`;
            });

            const ef = document.getElementById('e-units'); ef.innerHTML = '';
            eField.forEach((c, i) => {
                ef.innerHTML += `<div class="card ${c.isRest?'rest':''} ${selected && c.isRest?'is-targetable':''}" onclick="onTarget('warrior', ${i})">
                    <img src="${c.img}"><div class="badge atk-val">${c.atk}</div>
                    ${c.type==='blocker'?'<div class="tag tag-blocker">BLOCK</div>':''}</div>`;
            });

            const ph = document.getElementById('p-hand-ui'); ph.innerHTML = '';
            pHand.forEach((c, i) => {
                let badges = '';
                if (c.counter) badges += `<div class="tag tag-counter">C+${c.counter}</div>`;
                if (c.type === 'event') badges += `<div class="tag tag-event">EVENT</div>`;
                if (c.skills && c.skills.includes('rush')) badges += `<div class="tag tag-rush">RUSH</div>`;
                
                ph.innerHTML += `<div class="card" onclick="playCard(${i})">
                    <div class="cost-val">${c.cost}</div><img src="${c.img}">
                    ${badges}</div>`;
            });

            document.getElementById('e-leader').className = `card leader-card ${selected?'is-targetable':''}`;
            document.getElementById('p-leader').classList.toggle('is-attacking', selected?.type==='leader');
        }

        function addLog(m) { const l = document.getElementById('battle-log'); l.innerHTML += `<br>> ${m}`; l.scrollTop = l.scrollHeight; }
        function checkWin() { if(eHP<=0 || pHP<=0) { alert(eHP<=0?"คุณชนะ!":"คุณแพ้!"); location.reload(); } }
    </script>
</body>
</html>
