<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gods War: Organized Battlefield</title>
    <style>
        :root { --gold: #ffd700; --red: #ff4d4d; --blue: #00ccff; --bg: #0d0d0d; --green: #2ecc71; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        
        /* 1. ปรับขนาดพื้นที่สนามรบให้สูงขึ้นและจัดระเบียบใหม่ */
        .battlefield { 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
            padding: 30px; 
            background: radial-gradient(circle, #200 0%, #0d0d0d 100%);
            min-height: 550px; /* เพิ่มความสูง */
        }

        /* 2. จัดการโซนวางการ์ดให้กระจายตัวสวยงาม ไม่ทับกัน */
        .field-zone { 
            display: flex; 
            flex-wrap: wrap; /* ถ้าการ์ดเยอะให้ขึ้นบรรทัดใหม่ */
            gap: 20px; 
            justify-content: center; 
            align-items: center; 
            min-height: 160px; 
            padding: 10px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 20px;
        }

        /* 3. การ์ดแนวตั้ง (Portrait) */
        .card { 
            width: 90px; 
            height: 130px; 
            border: 2px solid var(--gold); 
            border-radius: 10px; 
            background: #111; 
            position: relative; 
            cursor: pointer; 
            transition: 0.3s;
            flex-shrink: 0; /* ป้องกันการ์ดถูกบีบตัว */
        }
        
        .card img { width: 100%; height: 60%; object-fit: cover; border-radius: 8px 8px 0 0; pointer-events: none; }
        
        /* สถานะการ์ดนอน (Rest) */
        .rest { transform: rotate(90deg) scale(0.9) !important; filter: brightness(0.4); }

        /* ระบบไฮไลท์ */
        .is-attacking { border: 4px solid var(--blue) !important; box-shadow: 0 0 20px var(--blue); transform: translateY(-10px); }
        .is-targetable { border: 4px solid var(--red) !important; animation: blink-red 0.8s infinite; }
        @keyframes blink-red { 50% { box-shadow: 0 0 20px var(--red); opacity: 0.8; } }

        /* Badge & Stats */
        .badge { position: absolute; padding: 2px 4px; border-radius: 4px; font-size: 10px; font-weight: bold; border: 1px solid #000; z-index: 5; }
        .atk-cost { bottom: 5px; left: 5px; background: var(--gold); color: #000; }
        .atk-val { bottom: 5px; right: 5px; background: var(--red); color: #fff; }
        .cost-val { top: -8px; left: -8px; background: var(--blue); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border: 1px solid white; }

        /* UI อื่นๆ */
        .header-stats { background: #000; padding: 15px; display: flex; justify-content: space-around; border-bottom: 2px solid var(--gold); }
        .ess-box { background: #222; padding: 5px 15px; border: 1px solid var(--gold); border-radius: 10px; font-weight: bold; min-width: 120px; }
        #battle-log { background: #000; color: #0f0; padding: 10px; height: 80px; overflow-y: auto; font-family: monospace; border-top: 1px solid var(--gold); text-align: left; }
        .hand-container { background: rgba(0,0,0,0.5); padding: 20px; display: flex; justify-content: center; gap: 15px; min-height: 160px; border-top: 2px solid #333; }
        button { padding: 10px 25px; font-weight: bold; cursor: pointer; border-radius: 20px; border: none; margin: 10px; background: var(--gold); }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="ess-box" style="color:var(--red)">🔱 ZEUS: <span id="e-hp">5</span> HP</div>
        <div style="font-size: 20px; font-weight: bold;">⛩️ CELESTIAL WAR 🔱</div>
        <div class="ess-box" style="color:var(--blue)">⛩️ YOU: <span id="p-hp">5</span> HP</div>
    </div>

    <div class="battlefield">
        <div id="enemy-full-zone" class="field-zone" style="border-color: var(--red);">
            <div id="e-leader" class="card" onclick="onTarget('leader', 0)" style="width: 110px; height: 150px; border-width: 4px;">
                <img src="https://res.cloudinary.com/dju44op8w/image/upload/v1777467100/Gemini_Generated_Image_y35m84y35m84y35m_phm30l.jpg">
                <div class="badge atk-cost">⚔️ 1</div><div class="badge atk-val">5000</div>
            </div>
            <div id="e-field-ui" style="display:flex; gap:15px; flex-wrap: wrap;"></div>
        </div>

        <div style="color: var(--gold); font-weight: bold; font-size: 14px;">--- สมรภูมิรบ ---</div>

        <div id="player-full-zone" class="field-zone" style="border-color: var(--blue);">
            <div id="p-field-ui" style="display:flex; gap:15px; flex-wrap: wrap;"></div>
            <div id="p-leader" class="card" onclick="onAttack('leader', 0)" style="width: 110px; height: 150px; border-width: 4px;">
                <img src="https://res.cloudinary.com/dju44op8w/image/upload/v1777472385/Gemini_Generated_Image_lkkjkalkkjkalkkj_y9swsw.jpg">
                <div class="badge atk-cost">⚔️ 1</div><div class="badge atk-val">5000</div>
            </div>
        </div>
    </div>

    <div id="battle-log">> คลิก "เริ่มเกม" เพื่อวางหมาก</div>
    <div class="controls">
        <button id="start-btn" style="background:var(--green)" onclick="initGame()">🔥 เริ่มเกม</button>
        <button style="background:var(--red); color:white" onclick="endTurn()">⏭️ จบเทิร์น</button>
        <div style="display:inline-block; margin-left:20px;">
            💎 ESSENCE: <span id="p-ess-ui" style="color:var(--blue); font-weight:bold;">0 / 0</span>
        </div>
    </div>

    <div id="p-hand-ui" class="hand-container"></div>

    <script>
        // ข้อมูลตัวละคร
        const cardsData = [
            { name: "Wukong", atk: 6000, cost: 5, atkCost: 2, img: "https://res.cloudinary.com/dju44op8w/image/upload/v1777467648/Gemini_Generated_Image_4wo9z44wo9z44wo9_ry0w3f.jpg" },
            { name: "Erlang", atk: 4500, cost: 2, atkCost: 1, img: "https://res.cloudinary.com/dju44op8w/image/upload/v1777472457/Gemini_Generated_Image_s7osias7osias7os_fabxbv.jpg" },
            { name: "Nezha", atk: 5500, cost: 3, atkCost: 1, img: "https://res.cloudinary.com/dju44op8w/image/upload/v1777472501/Gemini_Generated_Image_m8c3vam8c3vam8c3_pqnpqt.jpg" }
        ];

        let pHP = 5, eHP = 5, pEssActive = 1, pEssTotal = 1, isTurn = true;
        let pHand = [], pField = [], eField = [], selected = null;

        function initGame() {
            pHand = Array.from({length: 5}, () => ({...cardsData[Math.floor(Math.random()*3)], isRest: false}));
            document.getElementById('start-btn').style.display = 'none';
            addLog("⛩️ การรบเริ่มต้น! จั่วการ์ด 5 ใบ");
            updateUI();
        }

        // --- ระบบ 2 คลิก: เลือกตัวโจมตี ---
        function onAttack(type, idx) {
            if (!isTurn || selected) { selected = null; updateUI(); return; }
            let card = (type === 'leader') ? { name: "เง็กเซียน", atkCost: 1, isRest: document.getElementById('p-leader').classList.contains('rest') } : pField[idx];

            if (card.isRest || pEssActive < card.atkCost) { addLog("❌ ไม่สามารถสั่งโจมตีได้"); return; }
            
            selected = { type, idx, atkCost: card.atkCost };
            addLog(`🎯 [${card.name}] เตรียมโจมตี! คลิกเลือกเป้าหมายสีแดง`);
            updateUI();
        }

        // --- ระบบ 2 คลิก: เลือกเป้าหมาย ---
        function onTarget(type, idx) {
            if (!selected) return;
            let target = (type === 'leader') ? { name: "Zeus", isRest: true } : eField[idx];
            
            if (type !== 'leader' && !target.isRest) { addLog("❌ ตีได้เฉพาะตัวที่นอนอยู่!"); selected = null; updateUI(); return; }

            pEssActive -= selected.atkCost;
            if (selected.type === 'leader') document.getElementById('p-leader').classList.add('rest');
            else pField[selected.idx].isRest = true;

            if (type === 'leader') { eHP--; addLog("💥 โจมตี Zeus สำเร็จ!"); }
            else { addLog(`⚔️ ทำลาย ${eField[idx].name} สำเร็จ!`); eField.splice(idx, 1); }

            selected = null;
            updateUI();
            if(eHP <= 0) alert("คุณชนะ!");
        }

        function playCard(idx) {
            if (pEssActive < pHand[idx].cost) return;
            pEssActive -= pHand[idx].cost;
            pField.push(pHand.splice(idx, 1)[0]);
            updateUI();
        }

        function endTurn() {
            isTurn = false;
            addLog("💤 จบเทิร์น... Zeus กำลังเดินหมาก");
            setTimeout(() => {
                eField.push({...cardsData[Math.floor(Math.random()*3)], isRest: true});
                isTurn = true;
                pEssTotal = Math.min(10, pEssTotal + 2);
                pEssActive = pEssTotal;
                pField.forEach(c => c.isRest = false);
                document.getElementById('p-leader').classList.remove('rest');
                addLog(`✨ เทิร์นใหม่! ได้รับ ${pEssTotal} Essence`);
                updateUI();
            }, 1000);
        }

        function updateUI() {
            document.getElementById('e-hp').innerText = eHP;
            document.getElementById('p-hp').innerText = pHP;
            document.getElementById('p-ess-ui').innerText = `${pEssActive} / ${pEssTotal}`;
            
            // ไฮไลท์
            document.getElementById('e-leader').className = `card ${selected ? 'is-targetable' : ''}`;
            document.getElementById('p-leader').classList.toggle('is-attacking', selected?.type === 'leader');

            const pf = document.getElementById('p-field-ui'); pf.innerHTML = '';
            pField.forEach((c, i) => {
                pf.innerHTML += `<div class="card ${c.isRest ? 'rest' : ''} ${selected?.idx===i?'is-attacking':''}" onclick="onAttack('warrior', ${i})">
                    <img src="${c.img}"><div class="badge atk-cost">⚔️ ${c.atkCost}</div><div class="badge atk-val">${c.atk}</div></div>`;
            });

            const ef = document.getElementById('e-field-ui'); ef.innerHTML = '';
            eField.forEach((c, i) => {
                ef.innerHTML += `<div class="card ${c.isRest ? 'rest' : ''} ${selected && c.isRest ? 'is-targetable' : ''}" onclick="onTarget('warrior', ${i})">
                    <img src="${c.img}"><div class="badge atk-val">${c.atk}</div></div>`;
            });

            const ph = document.getElementById('p-hand-ui'); ph.innerHTML = '';
            pHand.forEach((c, i) => {
                ph.innerHTML += `<div class="card" onclick="playCard(${i})"><div class="badge cost-val">${c.cost}</div><img src="${c.img}"><div class="badge atk-val">${c.atk}</div></div>`;
            });
        }

        function addLog(m) { const l = document.getElementById('battle-log'); l.innerHTML += `<br>> ${m}`; l.scrollTop = l.scrollHeight; }
    </script>
</body>
</html>
