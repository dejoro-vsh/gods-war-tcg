<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gods War: Eternal Arena</title>
    <style>
        :root {
            --gold: #ffd700;
            --red: #ff4d4d;
            --purple: #bf00ff;
            --bg: #0a0a0a;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Header & Stats --- */
        .header-stats { 
            background: #000; 
            padding: 15px; 
            display: flex; 
            justify-content: space-around; 
            font-size: 22px; 
            font-weight: bold;
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        /* --- Battlefield --- */
        .battlefield { 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            height: 380px; 
            background: radial-gradient(circle, #222 0%, #0a0a0a 100%);
            border-bottom: 2px solid #333;
        }

        /* --- Card Styling --- */
        .card { 
            width: 120px; height: 170px; 
            border: 2px solid var(--gold); 
            border-radius: 12px; 
            background: #222;
            display: inline-block; 
            margin: 10px;
            cursor: pointer; 
            position: relative;
            overflow: hidden; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        .card:hover { transform: translateY(-15px) scale(1.05); }
        .card img { width: 100%; height: 75%; object-fit: cover; }
        .card-info { padding: 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .atk-badge { 
            position: absolute; bottom: 5px; right: 5px; 
            background: var(--red); color: white; 
            padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 14px;
        }

        /* --- Rarity Effects --- */
        .card.SR { 
            border-color: var(--purple); 
            box-shadow: 0 0 15px var(--purple);
            animation: sr-glow 2s infinite ease-in-out; 
        }
        .card.R { border-color: #00ccff; box-shadow: 0 0 10px #00ccff; }
        
        @keyframes sr-glow {
            0%, 100% { box-shadow: 0 0 10px var(--purple); filter: brightness(1); }
            50% { box-shadow: 0 0 30px var(--purple); filter: brightness(1.3); }
        }

        /* --- UI Elements --- */
        .hand-container { 
            background: rgba(0,0,0,0.5); 
            padding: 20px; 
            min-height: 200px; 
            border-top: 1px solid #333;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        #battle-log { 
            background: #000; color: #0f0; 
            padding: 10px; height: 100px; 
            overflow-y: auto; font-family: 'Courier New', monospace; 
            font-size: 13px; text-align: left;
        }
        
        .controls { padding: 20px; background: #111; }
        button { 
            padding: 12px 28px; font-size: 16px; 
            background: var(--gold); color: black;
            border: none; border-radius: 30px; 
            font-weight: bold; cursor: pointer; 
            margin: 5px; transition: 0.2s;
        }
        button:hover { transform: scale(1.1); background: #ffea00; }
        .btn-reset { background: #444; color: white; }
        .btn-reset:hover { background: #ff4d4d; }

        /* Zeus State */
        .zeus-dead {
            filter: grayscale(100%) brightness(0.4) !important;
            transform: rotate(15deg) translateY(30px) !important;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="header-stats">
        <div>🔱 Enemy Zeus HP: <span id="zeus-life" style="color:var(--red)">5</span></div>
        <div>🎴 Deck: <span id="deck-count">50</span></div>
    </div>

    <div class="battlefield">
        <div style="color:#555; font-style: italic;">สนามรบของคุณ</div>
        
        <div id="zeus-card" class="card" style="border-color:var(--red); width: 150px; height: 210px; cursor: default;">
            <img src="https://res.cloudinary.com/dju440p8w/image/upload/v1714397753/Zeus.jpg" alt="Zeus">
            <div class="card-info"><h3>ZEUS</h3></div>
            <div class="atk-badge" style="background: #222;">DEF: 5000</div>
        </div>
    </div>
